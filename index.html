<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta property="og:title" content="GigMate — Find Your Concert Buddy">
<meta property="og:description" content="Swipe to find concert buddies and turf partners in India">
<title>GigMate — Find Your Concert Buddy</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface-hover: #1a1a2e;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --text: #f1f1f3;
  --text-secondary: #71717a;
  --primary: #a855f7;
  --pink: #ec4899;
  --cyan: #06b6d4;
  --success: #22c55e;
  --danger: #ef4444;
  --gold: #f59e0b;
  --gradient: linear-gradient(135deg, #a855f7, #ec4899);
  --radius: 16px;
  --radius-sm: 8px;
  --radius-full: 9999px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --font: 'Inter', system-ui, -apple-system, sans-serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

::selection { background: rgba(168,85,247,0.3); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(168,85,247,0.5); }

a { color: inherit; text-decoration: none; }

canvas#particles {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
#app { position: relative; z-index: 1; min-height: 100vh; }
#toast-container {
  position: fixed; top: 20px; right: 20px; z-index: 10000;
  display: flex; flex-direction: column; gap: 10px; pointer-events: none;
}
#modal-container {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 9000; display: none;
}
#confetti-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 9999;
}

/* ===== GRADIENT TEXT ===== */
.gradient-text {
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ===== GLASS ===== */
.glass {
  background: rgba(18,18,26,0.7);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
}
.glass-strong {
  background: rgba(18,18,26,0.9);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border: 1px solid var(--border);
}

/* ===== CARD ===== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: var(--transition);
}
.card:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

/* ===== BUTTONS ===== */
.btn-gradient {
  background: var(--gradient); color: #fff; border: none;
  padding: 14px 32px; border-radius: var(--radius-full);
  font-family: var(--font); font-weight: 600; font-size: 16px;
  cursor: pointer; transition: var(--transition);
  position: relative; overflow: hidden; display: inline-flex;
  align-items: center; justify-content: center; gap: 8px;
}
.btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(168,85,247,0.4); }
.btn-gradient:active { transform: translateY(0); }
.btn-gradient:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-outline {
  background: transparent; color: var(--text);
  border: 1px solid var(--border-hover);
  padding: 12px 28px; border-radius: var(--radius-full);
  font-family: var(--font); font-weight: 500; font-size: 14px;
  cursor: pointer; transition: var(--transition);
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-outline:hover { border-color: var(--primary); background: rgba(168,85,247,0.1); }

.btn-icon {
  width: 48px; height: 48px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: var(--transition); font-size: 20px; flex-shrink: 0;
}
.btn-icon:hover { border-color: var(--border-hover); transform: scale(1.1); }
.btn-icon.danger { border-color: rgba(239,68,68,0.3); color: var(--danger); }
.btn-icon.danger:hover { background: rgba(239,68,68,0.1); box-shadow: 0 0 20px rgba(239,68,68,0.2); }
.btn-icon.success { border-color: rgba(34,197,94,0.3); color: var(--success); }
.btn-icon.success:hover { background: rgba(34,197,94,0.1); box-shadow: 0 0 20px rgba(34,197,94,0.2); }
.btn-icon.gold { border-color: rgba(245,158,11,0.3); color: var(--gold); }
.btn-icon.gold:hover { background: rgba(245,158,11,0.1); box-shadow: 0 0 20px rgba(245,158,11,0.2); }
.btn-icon.large { width: 60px; height: 60px; font-size: 24px; }

/* ===== INPUTS ===== */
.input {
  width: 100%; padding: 14px 18px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); font-family: var(--font); font-size: 16px;
  transition: var(--transition); outline: none;
}
.input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(168,85,247,0.15); }
.input::placeholder { color: var(--text-secondary); }
textarea.input { resize: vertical; min-height: 100px; }
select.input { appearance: auto; }

input[type="range"] {
  -webkit-appearance: none; width: 100%; height: 6px;
  background: var(--surface-hover); border-radius: 3px; outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 24px; height: 24px;
  border-radius: 50%; background: var(--gradient); cursor: pointer;
  border: 2px solid #fff; box-shadow: 0 2px 8px rgba(168,85,247,0.4);
}
input[type="range"]::-moz-range-thumb {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--primary); cursor: pointer; border: 2px solid #fff;
}

/* ===== BADGES ===== */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 12px; border-radius: var(--radius-full);
  font-size: 12px; font-weight: 600; white-space: nowrap;
}
.badge-primary { background: rgba(168,85,247,0.15); color: var(--primary); }
.badge-pink { background: rgba(236,72,153,0.15); color: var(--pink); }
.badge-cyan { background: rgba(6,182,212,0.15); color: var(--cyan); }
.badge-success { background: rgba(34,197,94,0.15); color: var(--success); }
.badge-gold { background: rgba(245,158,11,0.15); color: var(--gold); }
.badge-danger { background: rgba(239,68,68,0.15); color: var(--danger); }

/* ===== AVATAR ===== */
.avatar { border-radius: 50%; object-fit: cover; background: var(--surface-hover); }
.avatar-ring {
  position: relative; display: inline-flex; padding: 3px;
  border-radius: 50%; background: var(--gradient);
  background-size: 200% 200%; animation: gradientShift 3s ease infinite;
}
.avatar-ring .avatar { display: block; }

/* ===== TOAST ===== */
.toast {
  pointer-events: auto; padding: 14px 20px; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 500; display: flex; align-items: center;
  gap: 10px; min-width: 280px; max-width: 400px;
  animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.toast.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: var(--success); }
.toast.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: var(--danger); }
.toast.info { background: rgba(168,85,247,0.15); border: 1px solid rgba(168,85,247,0.3); color: var(--primary); }
.toast .toast-close { margin-left: auto; background: none; border: none; color: inherit; cursor: pointer; font-size: 18px; opacity: 0.7; }
.toast-exit { animation: slideOutRight 0.3s ease forwards; }

/* ===== SKELETON ===== */
.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm);
}

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 72px;
  display: flex; align-items: center; justify-content: space-around;
  z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0);
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 8px 16px; font-size: 11px; color: var(--text-secondary);
  text-decoration: none; transition: var(--transition); position: relative;
  border-radius: var(--radius-sm); cursor: pointer; border: none; background: none;
  font-family: var(--font);
}
.nav-item .nav-icon { font-size: 22px; }
.nav-item.active { color: var(--primary); }
.nav-item.active::before {
  content: ''; position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%);
  width: 20px; height: 3px; border-radius: 2px; background: var(--gradient);
}

/* ===== SIDE NAV ===== */
.side-nav {
  position: fixed; left: 0; top: 0; bottom: 0; width: 72px;
  display: none; flex-direction: column; align-items: center;
  padding: 20px 0; gap: 8px; z-index: 100;
  background: rgba(18,18,26,0.9); backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
}
.side-nav .nav-item {
  width: 52px; height: 52px; padding: 0; justify-content: center;
  border-radius: 12px; font-size: 0;
}
.side-nav .nav-item .nav-icon { font-size: 24px; }
.side-nav .nav-item.active::before {
  top: 50%; left: -2px; right: auto; bottom: auto;
  transform: translateY(-50%); width: 3px; height: 20px;
}
.side-nav .logo-small { font-size: 20px; font-weight: 800; margin-bottom: 20px; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px); display: flex; align-items: center;
  justify-content: center; z-index: 9001; animation: fadeIn 0.3s ease;
  padding: 20px;
}
.modal-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 32px; width: 100%;
  max-width: 420px; position: relative; animation: scaleIn 0.3s cubic-bezier(0.16,1,0.3,1);
}
.modal-close {
  position: absolute; top: 16px; right: 16px; background: none;
  border: none; color: var(--text-secondary); font-size: 24px;
  cursor: pointer; transition: var(--transition); width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center; border-radius: 50%;
}
.modal-close:hover { background: var(--surface-hover); color: var(--text); }

/* ===== PROGRESS BAR ===== */
.progress-bar {
  width: 100%; height: 4px; background: var(--surface-hover);
  border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--gradient); border-radius: 2px;
  transition: width 0.4s ease;
}

/* ===== SWIPE ===== */
.swipe-container {
  position: relative; height: 480px; width: 100%;
  display: flex; align-items: center; justify-content: center;
}
.swipe-card {
  position: absolute; inset: 0; border-radius: var(--radius);
  overflow: hidden; cursor: grab; user-select: none;
  touch-action: none; will-change: transform;
  border: 1px solid var(--border);
}
.swipe-card:active { cursor: grabbing; }
.swipe-stamp {
  position: absolute; top: 50%; transform: translateY(-50%);
  font-size: 36px; font-weight: 800; padding: 12px 24px;
  border-radius: 12px; border: 4px solid; opacity: 0;
  z-index: 10; pointer-events: none; letter-spacing: 2px;
  transition: none;
}
.stamp-right { right: 20px; color: var(--success); border-color: var(--success); background: rgba(34,197,94,0.1); }
.stamp-left { left: 20px; color: var(--danger); border-color: var(--danger); background: rgba(239,68,68,0.1); }

/* ===== CHAT ===== */
.chat-header {
  position: sticky; top: 0; padding: 16px; z-index: 10;
  display: flex; align-items: center; gap: 12px;
}
.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.chat-input-bar {
  padding: 12px 16px; display: flex; gap: 12px;
  align-items: center; border-top: 1px solid var(--border);
}
.chat-input-bar input {
  flex: 1; padding: 12px 16px; border-radius: var(--radius-full);
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 14px; outline: none;
}
.chat-input-bar input:focus { border-color: var(--primary); }
.chat-input-bar button {
  width: 44px; height: 44px; border-radius: 50%; background: var(--gradient);
  border: none; color: #fff; font-size: 18px; cursor: pointer;
  transition: var(--transition); flex-shrink: 0;
}
.chat-input-bar button:hover { transform: scale(1.05); }

.chat-bubble {
  max-width: 80%; padding: 10px 16px; border-radius: 18px;
  font-size: 14px; line-height: 1.5; word-wrap: break-word;
}
.chat-bubble.sent {
  background: var(--gradient); color: #fff;
  border-bottom-right-radius: 4px;
}
.chat-bubble.received {
  background: var(--surface-hover); color: var(--text);
  border: 1px solid var(--border); border-bottom-left-radius: 4px;
}
.chat-time { font-size: 10px; color: var(--text-secondary); margin-top: 2px; padding: 0 4px; }

.match-item {
  display: flex; align-items: center; gap: 14px; padding: 16px;
  border-radius: var(--radius); cursor: pointer; transition: var(--transition);
  border: 1px solid transparent;
}
.match-item:hover { background: var(--surface-hover); border-color: var(--border); }

/* ===== EVENT CARD ===== */
.event-card {
  border-radius: var(--radius); overflow: hidden; position: relative;
  cursor: pointer; transition: var(--transition); flex-shrink: 0;
}
.event-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.event-card img {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
}
.event-overlay {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  justify-content: flex-end; padding: 16px;
  background: linear-gradient(transparent 30%, rgba(0,0,0,0.85));
}

.event-interest-card {
  display: flex; gap: 14px; padding: 16px; border-radius: var(--radius);
  background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; transition: var(--transition); align-items: center;
}
.event-interest-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }

/* ===== TURF CARD ===== */
.turf-card {
  padding: 20px; border-radius: var(--radius); background: var(--surface);
  border: 1px solid var(--border); transition: var(--transition);
}
.turf-card:hover { border-color: var(--border-hover); }

/* ===== GENRE PILL ===== */
.genre-pill {
  display: inline-flex; align-items: center; padding: 8px 18px;
  border-radius: var(--radius-full); border: 1px solid var(--border);
  font-size: 13px; font-weight: 500; cursor: pointer; transition: var(--transition);
  color: var(--text-secondary); background: transparent; font-family: var(--font);
  user-select: none;
}
.genre-pill:hover { border-color: var(--border-hover); color: var(--text); }
.genre-pill.active {
  background: rgba(168,85,247,0.15); border-color: var(--primary);
  color: var(--primary); box-shadow: 0 0 12px rgba(168,85,247,0.2);
}

/* ===== PERSONA CARD ===== */
.persona-card {
  padding: 20px 12px; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--surface); text-align: center; cursor: pointer;
  transition: var(--transition); user-select: none;
}
.persona-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
.persona-card.active {
  border-color: var(--primary); background: rgba(168,85,247,0.08);
  box-shadow: 0 0 20px rgba(168,85,247,0.15);
}
.persona-emoji { font-size: 32px; display: block; margin-bottom: 8px; }
.persona-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.persona-desc { font-size: 11px; color: var(--text-secondary); }

/* ===== CITY CARD ===== */
.city-card {
  padding: 14px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--surface); text-align: center; cursor: pointer;
  font-size: 13px; font-weight: 500; transition: var(--transition); user-select: none;
}
.city-card:hover { border-color: var(--border-hover); }
.city-card.active {
  border-color: var(--primary); background: rgba(168,85,247,0.1);
  color: var(--primary);
}

/* ===== STATS ===== */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; text-align: center;
}
.stat-number { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
.stat-label { font-size: 12px; color: var(--text-secondary); }

/* ===== H-SCROLL ===== */
.h-scroll {
  display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px;
  scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
}
.h-scroll::-webkit-scrollbar { display: none; }
.h-scroll > * { scroll-snap-align: start; }

/* ===== FILTER PILLS ===== */
.filter-pills {
  display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px;
  scrollbar-width: none;
}
.filter-pills::-webkit-scrollbar { display: none; }
.filter-pill {
  padding: 8px 18px; border-radius: var(--radius-full); border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary); font-size: 13px;
  font-weight: 500; cursor: pointer; transition: var(--transition);
  white-space: nowrap; font-family: var(--font);
}
.filter-pill:hover { border-color: var(--border-hover); color: var(--text); }
.filter-pill.active {
  background: rgba(168,85,247,0.15); border-color: var(--primary);
  color: var(--primary);
}

/* ===== UPLOAD ZONE ===== */
.upload-zone {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 40px 20px; text-align: center; cursor: pointer;
  transition: var(--transition); position: relative; overflow: hidden;
  min-height: 200px; display: flex; align-items: center; justify-content: center;
}
.upload-zone:hover { border-color: var(--primary); }
.upload-zone.dragover { border-color: var(--primary); background: rgba(168,85,247,0.05); }
.upload-preview {
  width: 150px; height: 150px; border-radius: 50%; object-fit: cover;
  display: none;
}
.upload-zone.has-preview .upload-preview { display: block; }
.upload-zone.has-preview .upload-text { display: none; }

/* ===== FAB ===== */
.fab {
  position: fixed; bottom: 90px; right: 20px; width: 56px; height: 56px;
  border-radius: 50%; background: var(--gradient); color: #fff;
  font-size: 28px; border: none; cursor: pointer; z-index: 99;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(168,85,247,0.4); transition: var(--transition);
  font-weight: 300;
}
.fab:hover { transform: scale(1.1); box-shadow: 0 6px 30px rgba(168,85,247,0.5); }

/* ===== FLOATING ORBS ===== */
.orb {
  position: absolute; border-radius: 50%; filter: blur(80px);
  animation: orb-float 20s infinite ease-in-out; pointer-events: none;
  opacity: 0.3;
}
.orb-1 {
  width: 400px; height: 400px; background: var(--primary);
  top: -100px; right: -100px; animation-delay: 0s;
}
.orb-2 {
  width: 300px; height: 300px; background: var(--pink);
  bottom: 20%; left: -80px; animation-delay: -7s;
}
.orb-3 {
  width: 250px; height: 250px; background: var(--cyan);
  top: 50%; right: 10%; animation-delay: -14s;
}

/* ===== MATCH OVERLAY ===== */
.match-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.9);
  backdrop-filter: blur(20px); display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 8000;
  animation: fadeIn 0.5s ease;
}
.match-overlay .match-title {
  font-size: 48px; font-weight: 800; background: var(--gradient);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: matchPop 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

/* ===== LANDING PAGE ===== */
.landing-nav {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 16px 24px; display: flex; align-items: center;
  justify-content: space-between; z-index: 200; transition: var(--transition);
}
.landing-nav.scrolled {
  background: rgba(10,10,15,0.8); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.landing-nav .logo { font-size: 22px; font-weight: 800; }

.landing-hero {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  padding: 20px; position: relative;
}
.landing-hero h1 {
  font-size: clamp(36px, 8vw, 64px); font-weight: 800;

  async signInWithGoogle() {
    if (!supabase) { showToast('Backend not available. Demo mode only.', 'info'); return; }

      state.realtimeChannels.forEach(ch => supabase.removeChannel(ch));
      state.realtimeChannels = [];

  async getProfile(userId) {
    if (!supabase) return null;
    try {
      const { data, error } = await supabase.from('profiles').select('*').eq('id', userId).single();
      if (error && error.code !== 'PGRST116') throw error;
      return data;
    } catch (e) { console.warn('getProfile error:', e.message); return null; }
  },

  async updateProfile(userId, profileData) {
    if (!supabase) return profileData;
    try {
      const { data, error } = await supabase.from('profiles').upsert({ id: userId, ...profileData, updated_at: new Date().toISOString() }).select().single();
      if (error) throw error;
      state.profile = data;
      return data;
    } catch (e) { showToast('Failed to update profile: ' + e.message, 'error'); return null; }
  },

  async uploadAvatar(userId, file) {
    if (!supabase) return URL.createObjectURL(file);
    try {
      const ext = file.name.split('.').pop();
      const fileName = userId + '/avatar.' + ext;
      const { error: uploadError } = await supabase.storage.from('avatars').upload(fileName, file, { upsert: true });
      if (uploadError) throw uploadError;
      const { data } = supabase.storage.from('avatars').getPublicUrl(fileName);
      return data.publicUrl + '?t=' + Date.now();
    } catch (e) { showToast('Upload failed: ' + e.message, 'error'); return null; }
  },

  async getEvents(city) {
    if (!supabase) return DEMO_EVENTS;
    try {
      let query = supabase.from('events').select('*').order('event_date', { ascending: true });
      if (city && city !== 'All') query = query.eq('venue_city', city);
      const { data, error } = await query;

      return (data && data.length > 0) ? data : DEMO_EVENTS;

      const { data, error } = await supabase.from('event_interests').select('*, events(*)').eq('user_id', userId);

  async getProfilesForEvent(eventId, currentUserId) {
    if (!supabase || eventId.startsWith('demo-ev-')) return [];
    try {
      const { data: swipedData } = await supabase.from('swipes').select('swiped_id').eq('swiper_id', currentUserId).eq('event_id', eventId);

      swipedIds.push(currentUserId);
      const { data: interestedUsers } = await supabase.from('event_interests').select('user_id').eq('event_id', eventId).not('user_id', 'in', '(' + swipedIds.join(',') + ')');
      if (!interestedUsers || interestedUsers.length === 0) return [];
      const userIds = interestedUsers.map(u => u.user_id);
      const { data: profiles } = await supabase.from('profiles').select('*').in('id', userIds);
      return profiles || [];
    } catch (e) { return []; }

// ========== ANIMATIONS ==========
class ParticleSystem {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.particles = [];
    this.mouse = { x: -1000, y: -1000 };
    this.resize();
    this.createParticles();
    window.addEventListener('resize', () => this.resize());
    window.addEventListener('mousemove', (e) => { this.mouse.x = e.clientX; this.mouse.y = e.clientY; });
    this.animate();
  }
  resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
  createParticles() {
    const count = Math.min(80, Math.floor(window.innerWidth * window.innerHeight / 20000));
    this.particles = [];
    for (let i = 0; i < count; i++) {
      this.particles.push({
        x: Math.random() * this.canvas.width,
        y: Math.random() * this.canvas.height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        size: Math.random() * 2 + 0.5,
        opacity: Math.random() * 0.4 + 0.1
      });
    }
  }
  animate() {
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    this.particles.forEach((p, i) => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = this.canvas.width;
      if (p.x > this.canvas.width) p.x = 0;
      if (p.y < 0) p.y = this.canvas.height;
      if (p.y > this.canvas.height) p.y = 0;
      const dx = this.mouse.x - p.x, dy = this.mouse.y - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) { p.x -= dx * 0.008; p.y -= dy * 0.008; }
      this.ctx.beginPath();
      this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      this.ctx.fillStyle = 'rgba(168, 85, 247, ' + p.opacity + ')';
      this.ctx.fill();
      for (let j = i + 1; j < this.particles.length; j++) {
        const p2 = this.particles[j];
        const d = Math.sqrt((p.x - p2.x) ** 2 + (p.y - p2.y) ** 2);
        if (d < 100) {
          this.ctx.beginPath(); this.ctx.moveTo(p.x, p.y); this.ctx.lineTo(p2.x, p2.y);
          this.ctx.strokeStyle = 'rgba(168, 85, 247, ' + (0.06 * (1 - d / 100)) + ')';
          this.ctx.lineWidth = 0.5; this.ctx.stroke();
        }
      }
    });
    requestAnimationFrame(() => this.animate());
  }
}

class ConfettiSystem {
  constructor() {
    this.canvas = document.getElementById('confetti-canvas');
    this.ctx = this.canvas.getContext('2d');
    this.particles = []; this.active = false;
    this.resize();
    window.addEventListener('resize', () => this.resize());
  }
  resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
  burst() {
    this.particles = [];
    const colors = ['#a855f7', '#ec4899', '#06b6d4', '#22c55e', '#f59e0b', '#ef4444', '#fff'];
    for (let i = 0; i < 150; i++) {
      const angle = Math.random() * Math.PI * 2;
      const velocity = Math.random() * 12 + 4;
      this.particles.push({
        x: this.canvas.width / 2, y: this.canvas.height / 2,
        vx: Math.cos(angle) * velocity, vy: Math.sin(angle) * velocity - 5,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: Math.random() * 8 + 3, rotation: Math.random() * 360,
        rotationSpeed: (Math.random() - 0.5) * 10, opacity: 1, life: 0
      });
    }
    this.active = true; this.animateConfetti();
  }
  animateConfetti() {
    if (!this.active) return;
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    let alive = false;
    this.particles.forEach(p => {
      p.life += 1 / 60; if (p.life > 3) return;
      alive = true; p.x += p.vx; p.y += p.vy; p.vy += 0.3;
      p.rotation += p.rotationSpeed; p.opacity = Math.max(0, 1 - p.life / 3);
      this.ctx.save(); this.ctx.translate(p.x, p.y);
      this.ctx.rotate(p.rotation * Math.PI / 180);
      this.ctx.globalAlpha = p.opacity; this.ctx.fillStyle = p.color;
      this.ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
      this.ctx.restore();
    });
    if (alive) requestAnimationFrame(() => this.animateConfetti());
    else { this.active = false; this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); }
  }
}

function showToast(message, type) {
  type = type || 'info';
  const container = document.getElementById('toast-container');
  if (!container) return;
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  toast.innerHTML = '<span>' + (icons[type] || 'ℹ') + '</span><span>' + message + '</span><button class="toast-close" onclick="this.parentElement.classList.add(\'toast-exit\');setTimeout(()=>this.parentElement.remove(),300)">&times;</button>';
  container.appendChild(toast);
  setTimeout(() => { if (toast.parentElement) { toast.classList.add('toast-exit'); setTimeout(() => toast.remove(), 300); } }, 3500);
}

function staggerIn(parent) {
  if (!parent) return;
  const children = parent.querySelectorAll('[data-animate]');
  children.forEach((child, i) => { setTimeout(() => child.classList.add('visible'), i * 80 + 50); });
}

function animateCounter(el, target) {
  if (!el || isNaN(target)) return;
  const duration = 2000; const start = performance.now();
  const update = (now) => {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.floor(eased * target).toLocaleString();
    if (progress < 1) requestAnimationFrame(update);
  };
  requestAnimationFrame(update);
}

function scrollReveal() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) { entry.target.classList.add('revealed'); observer.unobserve(entry.target); }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('[data-reveal]').forEach(el => observer.observe(el));
}

function typewriter(element, texts) {
  if (!element) return;
  let textIndex = 0, charIndex = 0, isDeleting = false, timeout;
  function tick() {
    const current = texts[textIndex];
    if (isDeleting) {
      charIndex--;
      element.textContent = current.substring(0, charIndex);
      if (charIndex === 0) { isDeleting = false; textIndex = (textIndex + 1) % texts.length; timeout = setTimeout(tick, 500); return; }
      timeout = setTimeout(tick, 30);
    } else {
      charIndex++;
      element.textContent = current.substring(0, charIndex);
      if (charIndex === current.length) { isDeleting = true; timeout = setTimeout(tick, 2000); return; }
      timeout = setTimeout(tick, 80);
    }
  }
  tick();
  return () => clearTimeout(timeout);
}

function initSwipeCard(card, callbacks) {
  let startX = 0, startY = 0, currentX = 0, currentY = 0, isDragging = false;
  const stampRight = card.querySelector('.stamp-right');
  const stampLeft = card.querySelector('.stamp-left');
  function getPos(e) { return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY }; }
  function onStart(e) { isDragging = true; const pos = getPos(e); startX = pos.x; startY = pos.y; card.style.transition = 'none'; }
  function onMove(e) {
    if (!isDragging) return; e.preventDefault();
    const pos = getPos(e); currentX = pos.x - startX; currentY = pos.y - startY;
    const rotation = currentX * 0.08;
    card.style.transform = 'translate(' + currentX + 'px, ' + currentY + 'px) rotate(' + rotation + 'deg)';
    if (stampRight) stampRight.style.opacity = Math.max(0, Math.min(1, currentX / 100));
    if (stampLeft) stampLeft.style.opacity = Math.max(0, Math.min(1, -currentX / 100));
  }
  function onEnd() {
    if (!isDragging) return; isDragging = false;
    card.style.transition = 'transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s';
    if (currentX > 100) {
      card.style.transform = 'translate(' + window.innerWidth + 'px, ' + currentY + 'px) rotate(30deg)';
      card.style.opacity = '0';
      setTimeout(() => callbacks.onSwipeRight && callbacks.onSwipeRight(), 300);
    } else if (currentX < -100) {
      card.style.transform = 'translate(' + (-window.innerWidth) + 'px, ' + currentY + 'px) rotate(-30deg)';
      card.style.opacity = '0';
      setTimeout(() => callbacks.onSwipeLeft && callbacks.onSwipeLeft(), 300);
    } else if (currentY < -100) {
      card.style.transform = 'translate(0, ' + (-window.innerHeight) + 'px) scale(0.5)';
      card.style.opacity = '0';
      setTimeout(() => callbacks.onSwipeUp && callbacks.onSwipeUp(), 300);
    } else {
      card.style.transform = 'translate(0, 0) rotate(0)';
      if (stampRight) stampRight.style.opacity = '0';
      if (stampLeft) stampLeft.style.opacity = '0';
    }
    currentX = 0; currentY = 0;
  }
  card.addEventListener('mousedown', onStart);
  card.addEventListener('touchstart', onStart, { passive: true });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mouseup', onEnd);
  window.addEventListener('touchend', onEnd);
}

// ========== UTILITY FUNCTIONS ==========
function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
}
function timeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = Math.floor((new Date() - new Date(dateStr)) / 1000);
  if (diff < 60) return 'now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h';
  return Math.floor(diff / 86400) + 'd';
}
function getDefaultAvatar(name) {
  return 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + encodeURIComponent(name || 'user');
}
function getMatchPercentage(genres1, genres2) {
  if (!genres1 || !genres2 || !genres1.length || !genres2.length) return Math.floor(Math.random() * 30 + 65);
  const shared = genres1.filter(g => genres2.includes(g));
  return Math.min(99, Math.floor((shared.length / Math.max(genres1.length, genres2.length)) * 100) + 40);
}
function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

function onboardingPage() {
  return {
    html: '<div class="page-container" style="max-width:480px;min-height:100vh;display:flex;flex-direction:column">' +
      '<div class="progress-bar mb-24" style="margin-top:20px"><div class="progress-fill" id="onb-progress" style="width:14.28%"></div></div>' +
      '<div id="onb-content" style="flex:1;display:flex;flex-direction:column;justify-content:center"></div>' +
      '<div style="display:flex;justify-content:space-between;align-items:center;padding:20px 0">' +
        '<button class="btn-outline" id="onb-back" style="visibility:hidden">← Back</button>' +
        '<button class="btn-gradient" id="onb-next" disabled>Next →</button>' +
      '</div></div>',
    init() {
      let step = 1;
      const totalSteps = 7;
      const data = { full_name: '', city: '', favorite_genres: [], energy_level: 5, concert_persona: '', avatar_url: '', bio: '' };

      function renderStep() {
        const content = document.getElementById('onb-content');
        const progress = document.getElementById('onb-progress');
        const backBtn = document.getElementById('onb-back');
        const nextBtn = document.getElementById('onb-next');
        if (!content) return;
        progress.style.width = ((step / totalSteps) * 100) + '%';
        backBtn.style.visibility = step === 1 ? 'hidden' : 'visible';
        nextBtn.textContent = step === totalSteps ? "Let's Go! 🚀" : 'Next →';

        if (step === 1) {
          content.innerHTML = '<div class="page-enter text-center"><div style="font-size:48px;margin-bottom:16px">👋</div><h2 style="font-size:28px;font-weight:800;margin-bottom:8px">What should we call you?</h2><p class="text-secondary mb-24">Your first name is perfect</p><input type="text" class="input" id="onb-name" placeholder="Your name" value="' + data.full_name + '" style="text-align:center;font-size:20px;max-width:300px;margin:0 auto"></div>';
          setTimeout(() => {
            const inp = document.getElementById('onb-name');
            if (inp) { inp.focus(); inp.oninput = (e) => { data.full_name = e.target.value; updateNext(); }; }
          }, 100);
        } else if (step === 2) {
          content.innerHTML = '<div class="page-enter text-center"><div style="font-size:48px;margin-bottom:16px">📍</div><h2 style="font-size:28px;font-weight:800;margin-bottom:8px">Pick your city</h2><p class="text-secondary mb-24">We\'ll show you nearby events</p><div class="grid-3" style="max-width:400px;margin:0 auto">' + INDIAN_CITIES.map(c => '<div class="city-card ' + (data.city === c ? 'active' : '') + '" data-city="' + c + '">' + c + '</div>').join('') + '</div></div>';
          document.querySelectorAll('.city-card').forEach(card => {
            card.onclick = () => { document.querySelectorAll('.city-card').forEach(c => c.classList.remove('active')); card.classList.add('active'); data.city = card.dataset.city; updateNext(); };
          });
        } else if (step === 3) {
          content.innerHTML = '<div class="page-enter text-center"><div style="font-size:48px;margin-bottom:16px">🎵</div><h2 style="font-size:28px;font-weight:800;margin-bottom:8px">What music are you into?</h2><p class="text-secondary mb-24">Pick up to 5 genres</p><div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:450px;margin:0 auto">' + MUSIC_GENRES.map(g => '<div class="genre-pill ' + (data.favorite_genres.includes(g) ? 'active' : '') + '" data-genre="' + g + '">' + g + '</div>').join('') + '</div><p class="text-secondary text-xs mt-16" id="genre-count">' + data.favorite_genres.length + '/5 selected</p></div>';
          document.querySelectorAll('.genre-pill').forEach(pill => {
            pill.onclick = () => {
              const genre = pill.dataset.genre;
              if (data.favorite_genres.includes(genre)) { data.favorite_genres = data.favorite_genres.filter(g => g !== genre); pill.classList.remove('active'); }
              else if (data.favorite_genres.length < 5) { data.favorite_genres.push(genre); pill.classList.add('active'); }
              else { showToast('Max 5 genres!', 'info'); return; }
              document.getElementById('genre-count').textContent = data.favorite_genres.length + '/5 selected';
              updateNext();
            };
          });
        } else if (step === 4) {
          const vibeLabels = ['☁️ Super Chill', '😌 Chill Macha', '🙂 Easy Going', '😊 Moderate', '🤩 Getting There', '🔥 Energetic', '💃 Party Mode', '🕺 Full Energy', '⚡ Insane', '🤯 Full Paagal'];
          content.innerHTML = '<div class="page-enter text-center"><div style="font-size:48px;margin-bottom:16px">⚡</div><h2 style="font-size:28px;font-weight:800;margin-bottom:8px">Your vibe level?</h2><p class="text-secondary mb-24">How crazy do you get at events?</p><div style="max-width:350px;margin:0 auto"><div id="vibe-label" style="font-size:24px;font-weight:700;margin-bottom:20px;min-height:40px">' + vibeLabels[data.energy_level - 1] + '</div><input type="range" min="1" max="10" value="' + data.energy_level + '" id="vibe-slider"><div style="display:flex;justify-content:space-between;margin-top:8px"><span class="text-secondary text-xs">Chill</span><span class="text-secondary text-xs">Paagal</span></div></div></div>';
          const slider = document.getElementById('vibe-slider');
          if (slider) slider.oninput = (e) => { data.energy_level = parseInt(e.target.value); document.getElementById('vibe-label').textContent = vibeLabels[data.energy_level - 1]; updateNext(); };
        } else if (step === 5) {
          content.innerHTML = '<div class="page-enter text-center"><div style="font-size:48px;margin-bottom:16px">🎭</div><h2 style="font-size:28px;font-weight:800;margin-bottom:8px">Your concert persona</h2><p class="text-secondary mb-24">Which one describes you best?</p><div class="grid-2" style="max-width:450px;margin:0 auto">' + CONCERT_PERSONAS.map(p => { const val = p.emoji + ' ' + p.title; return '<div class="persona-card ' + (data.concert_persona === val ? 'active' : '') + '" data-persona="' + val + '"><span class="persona-emoji">' + p.emoji + '</span><div class="persona-title">' + p.title + '</div><div class="persona-desc">' + p.desc + '</div></div>'; }).join('') + '</div></div>';
          document.querySelectorAll('.persona-card').forEach(card => {
            card.onclick = () => { document.querySelectorAll('.persona-card').forEach(c => c.classList.remove('active')); card.classList.add('active'); data.concert_persona = card.dataset.persona; updateNext(); };
          });
        } else if (step === 6) {
          content.innerHTML = '<div class="page-enter text-center"><div style="font-size:48px;margin-bottom:16px">📸</div><h2 style="font-size:28px;font-weight:800;margin-bottom:8px">Add a photo</h2><p class="text-secondary mb-24">Let people know who they\'re vibing with</p><div class="upload-zone ' + (data.avatar_url ? 'has-preview' : '') + '" id="upload-zone" style="max-width:300px;margin:0 auto"><img class="upload-preview" id="avatar-preview" src="' + (data.avatar_url || '') + '" alt=""><div class="upload-text"><div style="font-size:40px;margin-bottom:8px">📁</div><p class="text-secondary">Drag & drop or click to upload</p></div><input type="file" accept="image/*" id="avatar-input" style="display:none"></div><p class="text-secondary text-xs mt-8">Or skip for now</p></div>';
          const zone = document.getElementById('upload-zone');
          const fileInput = document.getElementById('avatar-input');
          zone.onclick = () => fileInput.click();
          zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('dragover'); };
          zone.ondragleave = () => zone.classList.remove('dragover');
          zone.ondrop = (e) => { e.preventDefault(); zone.classList.remove('dragover'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); };
          fileInput.onchange = (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); };
          async function handleFile(file) {
            const preview = document.getElementById('avatar-preview');
            const reader = new FileReader();
            reader.onload = (e) => { preview.src = e.target.result; zone.classList.add('has-preview'); };
            reader.readAsDataURL(file);
            if (state.user) {
              showToast('Uploading...', 'info');
              const url = await API.uploadAvatar(state.user.id, file);
              if (url) { data.avatar_url = url; showToast('Photo uploaded!', 'success'); }
            } else {
              data.avatar_url = URL.createObjectURL(file);
            }
            updateNext();
          }
        } else if (step === 7) {
          content.innerHTML = '<div class="page-enter text-center"><div style="font-size:48px;margin-bottom:16px">✍️</div><h2 style="font-size:28px;font-weight:800;margin-bottom:8px">Write a one-liner bio</h2><p class="text-secondary mb-24">Something fun that describes you</p><textarea class="input" id="onb-bio" placeholder="e.g., Looking for someone to headbang at the next Local Train gig 🤘" maxlength="150" style="max-width:400px;margin:0 auto;height:120px">' + data.bio + '</textarea><p class="text-secondary text-xs mt-8"><span id="bio-count">' + data.bio.length + '</span>/150</p></div>';
          const ta = document.getElementById('onb-bio');
          if (ta) { ta.focus(); ta.oninput = (e) => { data.bio = e.target.value; document.getElementById('bio-count').textContent = data.bio.length; updateNext(); }; }
        }
        updateNext();
      }

      function updateNext() {
        const btn = document.getElementById('onb-next');
        if (!btn) return;
        let valid = false;
        if (step === 1) valid = data.full_name.trim().length >= 2;
        else if (step === 2) valid = data.city.length > 0;
        else if (step === 3) valid = data.favorite_genres.length >= 1;
        else if (step === 4) valid = true;
        else if (step === 5) valid = data.concert_persona.length > 0;
        else if (step === 6) valid = true;
        else if (step === 7) valid = true;
        btn.disabled = !valid;
      }

      document.getElementById('onb-next').onclick = async () => {
        if (step < totalSteps) { step++; renderStep(); }
        else {
          const btn = document.getElementById('onb-next');
          btn.textContent = 'Saving...'; btn.disabled = true;
          if (state.user) {
            await API.updateProfile(state.user.id, {
              full_name: data.full_name.trim(), city: data.city, favorite_genres: data.favorite_genres,
              energy_level: data.energy_level, concert_persona: data.concert_persona,
              avatar_url: data.avatar_url || getDefaultAvatar(data.full_name),
              bio: data.bio.trim() || (data.concert_persona.split('—')[0].trim() + ' vibes only ✨')
            });
          } else {
            state.profile = { full_name: data.full_name.trim(), city: data.city, favorite_genres: data.favorite_genres, energy_level: data.energy_level, concert_persona: data.concert_persona, avatar_url: data.avatar_url || getDefaultAvatar(data.full_name), bio: data.bio.trim() || 'Music lover ✨', total_events: 0, total_matches: 0, rating_avg: null };
          }
          showToast('Welcome to GigMate! 🎉', 'success');
          navigate('#home');
        }
      };
      document.getElementById('onb-back').onclick = () => { if (step > 1) { step--; renderStep(); } };
      renderStep();
    }
  };
}

function swipePage(eventId) {
  return {
    html: '<div class="main-content"><div class="page-container page-enter" style="max-width:420px">' +
      '<div class="flex items-center gap-12 mb-16" data-animate><button class="btn-icon" onclick="navigate(\'#swipe\')" style="width:36px;height:36px;font-size:16px">←</button><div id="swipe-event-name" style="font-weight:600;font-size:15px">Loading...</div></div>' +
      '<div class="swipe-container" id="swipe-container"></div>' +
      '<div class="flex justify-center items-center gap-20 mt-24" id="swipe-actions"><button class="btn-icon large danger" id="btn-pass" title="Pass">✕</button><button class="btn-icon large gold" id="btn-super" title="Super Like">⭐</button><button class="btn-icon large success" id="btn-like" title="Like">♥</button></div>' +
      '<div style="height:80px"></div></div>' + renderNavigation('swipe') + '</div>',
    async init() {
      let profiles = [];
      let currentIndex = 0;
      let eventData = null;

      if (eventId) {
        eventData = await API.getEventById(eventId);
        const nameEl = document.getElementById('swipe-event-name');
        if (nameEl && eventData) nameEl.textContent = eventData.title;
        else if (nameEl) nameEl.textContent = 'Swipe Mode';
        if (state.user && !eventId.startsWith('demo-ev-')) profiles = await API.getProfilesForEvent(eventId, state.user.id);
      }
      if (profiles.length === 0) profiles = [...DEMO_PROFILES].sort(() => Math.random() - 0.5);

      function renderCards() {
        const container = document.getElementById('swipe-container');
        if (!container) return;
        if (currentIndex >= profiles.length) {
          container.innerHTML = '<div class="empty-state" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center"><span class="empty-emoji">🎵</span><h3>All caught up!</h3><p>No more people to swipe on right now. Check back later!</p><button class="btn-gradient mt-24" onclick="navigate(\'#swipe\')">Browse Events</button></div>';
          const acts = document.getElementById('swipe-actions');
          if (acts) acts.style.display = 'none';
          return;
        }
        const visible = profiles.slice(currentIndex, currentIndex + 3);
        container.innerHTML = visible.map((p, i) => {
          const matchPct = getMatchPercentage(state.profile?.favorite_genres, p.favorite_genres);
          const shared = (state.profile?.favorite_genres || []).filter(g => (p.favorite_genres || []).includes(g));
          const zIndex = 3 - i;
          const scale = 1 - i * 0.05;
          const ty = i * 8;
          return '<div class="swipe-card" style="z-index:' + zIndex + ';transform:scale(' + scale + ') translateY(' + ty + 'px);' + (i > 0 ? 'pointer-events:none;' : '') + '" data-index="' + (currentIndex + i) + '">' +
            '<div style="position:absolute;inset:0;background:var(--surface)"></div>' +
            '<img src="' + (p.avatar_url || getDefaultAvatar(p.full_name)) + '" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.6" onerror="this.src=\'' + getDefaultAvatar(p.full_name) + '\'">' +
            '<div style="position:absolute;inset:0;background:linear-gradient(transparent 30%, rgba(0,0,0,0.9))"></div>' +

              (p.concert_persona ? '<span class="badge badge-primary" style="margin-bottom:10px">' + p.concert_persona.split('—')[0].trim() + '</span>' : '') +
              '<div style="margin-bottom:10px"><div class="flex justify-between items-center" style="margin-bottom:4px"><span style="font-size:12px;color:var(--text-secondary)">Music Match</span><span style="font-size:12px;font-weight:700;color:var(--primary)">' + matchPct + '%</span></div><div class="progress-bar"><div class="progress-fill" style="width:' + matchPct + '%"></div></div></div>' +
              (shared.length > 0 ? '<div class="flex gap-8" style="flex-wrap:wrap;margin-bottom:8px">' + shared.map(g => '<span class="badge badge-primary" style="font-size:10px;padding:2px 8px">' + g + '</span>').join('') + '</div>' : '') +
              (p.bio ? '<p style="font-size:13px;color:var(--text-secondary);font-style:italic">"' + p.bio + '"</p>' : '') +
              (p.total_events ? '<p style="font-size:11px;color:var(--text-secondary);margin-top:6px">🎫 ' + p.total_events + ' events attended</p>' : '') +
            '</div></div>';
        }).join('');
        setupCurrentCard();
      }

      function setupCurrentCard() {
        const container = document.getElementById('swipe-container');
        if (!container) return;
        const frontCard = container.querySelector('.swipe-card[data-index="' + currentIndex + '"]');
        if (!frontCard) return;
        initSwipeCard(frontCard, { onSwipeRight: () => handleSwipe('right'), onSwipeLeft: () => handleSwipe('left'), onSwipeUp: () => handleSwipe('super') });
      }

      async function handleSwipe(direction) {
        const profile = profiles[currentIndex];
        if (!profile) return;
        if (state.user && !profile.id.startsWith('demo-') && eventId && !eventId.startsWith('demo-ev-')) {
          const match = await API.createSwipe(state.user.id, profile.id, eventId, direction);
          if (match) showMatchOverlay(profile);
        } else if (direction === 'right' || direction === 'super') {
          if (Math.random() < 0.3) showMatchOverlay(profile);
        }
        currentIndex++;
        renderCards();
      }

      function showMatchOverlay(matchedProfile) {
        if (confetti) confetti.burst();
        const overlay = document.createElement('div');
        overlay.className = 'match-overlay';
        overlay.innerHTML = '<div class="match-title">It\'s a Match! 🎉</div><p class="text-secondary mt-16" style="font-size:16px">You and ' + matchedProfile.full_name + ' are going together!</p><div class="flex gap-16 mt-32"><button class="btn-gradient" onclick="this.closest(\'.match-overlay\').remove()">Keep Swiping</button><button class="btn-outline" onclick="this.closest(\'.match-overlay\').remove();navigate(\'#chat\')">Say Hi 👋</button></div>';
        document.body.appendChild(overlay);
        setTimeout(() => { if (overlay.parentElement) overlay.remove(); }, 8000);
      }

      document.getElementById('btn-pass')?.addEventListener('click', () => {
        const container = document.getElementById('swipe-container');
        const fc = container?.querySelector('.swipe-card[data-index="' + currentIndex + '"]');
        if (fc) { fc.style.transition = 'transform 0.4s ease, opacity 0.4s'; fc.style.transform = 'translateX(-150%) rotate(-30deg)'; fc.style.opacity = '0'; setTimeout(() => handleSwipe('left'), 300); }
      });
      document.getElementById('btn-like')?.addEventListener('click', () => {
        const container = document.getElementById('swipe-container');
        const fc = container?.querySelector('.swipe-card[data-index="' + currentIndex + '"]');
        if (fc) { fc.style.transition = 'transform 0.4s ease, opacity 0.4s'; fc.style.transform = 'translateX(150%) rotate(30deg)'; fc.style.opacity = '0'; setTimeout(() => handleSwipe('right'), 300); }
      });
      document.getElementById('btn-super')?.addEventListener('click', () => {
        const container = document.getElementById('swipe-container');
        const fc = container?.querySelector('.swipe-card[data-index="' + currentIndex + '"]');
        if (fc) { fc.style.transition = 'transform 0.4s ease, opacity 0.4s'; fc.style.transform = 'translateY(-150%) scale(0.5)'; fc.style.opacity = '0'; setTimeout(() => handleSwipe('super'), 300); }
      });
      renderCards();
    }
  };
}

function chatDetailPage(matchId) {
  return {
    html: '<div class="main-content" style="height:100vh;display:flex;flex-direction:column">' +
      '<div class="chat-header glass-strong" id="chat-detail-header"><button class="btn-icon" onclick="navigate(\'#chat\')" style="width:36px;height:36px;font-size:16px">←</button><div class="avatar-ring" style="padding:2px"><img class="avatar" width="36" height="36" id="chat-avatar" src="" alt=""></div><div><h4 style="font-weight:600;font-size:15px" id="chat-name">Loading...</h4><p class="text-secondary text-xs" id="chat-event-tag"></p></div></div>' +
      '<div class="chat-messages" id="chat-messages"><div class="skeleton" style="height:40px;width:60%;border-radius:16px"></div><div class="skeleton" style="height:40px;width:40%;border-radius:16px;align-self:flex-end"></div></div>' +
      '<div class="chat-input-bar glass-strong"><input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off"><button id="chat-send">➤</button></div></div>',
    async init() {
      const userId = state.user?.id;
      if (!userId || !matchId) { navigate('#chat'); return; }
      const matches = await API.getMatches(userId);
      const match = matches.find(m => m.id === matchId);
      if (!match) { navigate('#chat'); return; }
      const other = match.user1_id === userId ? match.user2 : match.user1;
      const event = match.event;
      const avatarEl = document.getElementById('chat-avatar');
      if (avatarEl) { avatarEl.src = other?.avatar_url || getDefaultAvatar(other?.full_name); avatarEl.onerror = function() { this.src = getDefaultAvatar(other?.full_name); }; }
      document.getElementById('chat-name').textContent = other?.full_name || 'Unknown';
      if (event) document.getElementById('chat-event-tag').textContent = '🎵 ' + event.title + ' · ' + formatDate(event.event_date);

      const messagesContainer = document.getElementById('chat-messages');
      const messages = await API.getMessages(matchId);

      function renderMessages(msgs) {
        if (!messagesContainer) return;
        if (msgs.length === 0) { messagesContainer.innerHTML = '<div class="text-center" style="padding:40px 20px;margin:auto"><div style="font-size:48px;margin-bottom:12px">👋</div><p class="text-secondary">Say hi to ' + (other?.full_name || 'them') + '!</p></div>'; return; }
        messagesContainer.innerHTML = msgs.map(msg => '<div style="display:flex;flex-direction:column;' + (msg.sender_id === userId ? 'align-items:flex-end' : 'align-items:flex-start') + '"><div class="chat-bubble ' + (msg.sender_id === userId ? 'sent' : 'received') + '">' + escapeHtml(msg.content) + '</div><span class="chat-time">' + timeAgo(msg.created_at) + '</span></div>').join('');
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }
      renderMessages(messages);
      API.subscribeToMessages(matchId, (newMsg) => { if (newMsg.sender_id !== userId) { messages.push(newMsg); renderMessages(messages); } });
      const input = document.getElementById('chat-input');
      const sendBtn = document.getElementById('chat-send');
      async function sendMsg() {
        const content = input.value.trim();
        if (!content) return;
        input.value = '';
        const msg = await API.sendMessage(matchId, userId, content);
        if (msg) { messages.push(msg); renderMessages(messages); }
      }
      sendBtn?.addEventListener('click', sendMsg);
      input?.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMsg(); });
      input?.focus();
    }
  };
}

// ========== ROUTER ==========
function getRoute() {
  const hash = window.location.hash.slice(1) || '';
  const parts = hash.split('/');
  return { page: parts[0] || '', param: parts.slice(1).join('/') || '' };
}

async function router() {
  const { page, param } = getRoute();
  const app = document.getElementById('app');
  if (!app) return;

  const routeKey = page + '/' + param;
  if (state.currentPage === routeKey && page !== '') return;
  state.currentPage = routeKey;

  let pageObj;

  switch (page) {
    case '':
      if (state.user && state.profile?.full_name) { navigate('#home'); return; }
      pageObj = landingPage();
      break;
    case 'onboarding':
      pageObj = onboardingPage();
      break;
    case 'home':
      if (!state.user && !state.profile) { navigate(''); return; }
      pageObj = homePage();
      break;
    case 'swipe':
      if (!state.user && !state.profile) { navigate(''); return; }
      pageObj = param ? swipePage(param) : swipeEventSelectPage();
      break;
    case 'chat':
      if (!state.user) { navigate(''); return; }
      pageObj = param ? chatDetailPage(param) : chatListPage();
      break;
    case 'turf':
      if (!state.user && !state.profile) { navigate(''); return; }
      pageObj = turfPage();
      break;
    case 'profile':
      if (!state.user && !state.profile) { navigate(''); return; }
      pageObj = profilePage();
      break;
    default:
      navigate(state.user ? '#home' : '');
      return;
  }

  if (pageObj) {
    app.style.opacity = '0';
    setTimeout(() => {
      app.innerHTML = pageObj.html;
      app.style.opacity = '1';
      app.style.transition = 'opacity 0.2s ease';
      if (pageObj.init) pageObj.init();
    }, 50);
  }
}

window.addEventListener('hashchange', router);

// ========== INIT ==========
let confetti;

async function initApp() {
  try {
    new ParticleSystem(document.getElementById('particles'));
  } catch(e) { console.warn('Particles failed:', e); }

  try {
    confetti = new ConfettiSystem();
  } catch(e) { console.warn('Confetti failed:', e); }

  if (supabase) {
    try {
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user) {
        state.user = session.user;
        state.profile = await API.getProfile(session.user.id);
        if (!state.profile?.full_name || !state.profile?.city) {
          navigate('#onboarding');
        } else if (!window.location.hash || window.location.hash === '#' || window.location.hash === '') {
          navigate('#home');
        }
        API.subscribeToNewMatches(session.user.id, () => { showToast("It's a match! 🎉", 'success'); if (confetti) confetti.burst(); });
      }
    } catch(e) { console.warn('Session check failed:', e); }

    try {
      supabase.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session?.user) {
          state.user = session.user;
          state.profile = await API.getProfile(session.user.id);
          const modal = document.getElementById('modal-container');
          if (modal) { modal.style.display = 'none'; modal.innerHTML = ''; }
          if (!state.profile?.full_name || !state.profile?.city) navigate('#onboarding');
          else navigate('#home');
          API.subscribeToNewMatches(session.user.id, () => { showToast("It's a match! 🎉", 'success'); if (confetti) confetti.burst(); });
        } else if (event === 'SIGNED_OUT') {
          state.user = null; state.profile = null; state.currentPage = '';
          navigate('');
        }
      });
    } catch(e) { console.warn('Auth listener failed:', e); }
  }

  await router();
}

document.addEventListener('DOMContentLoaded', initApp);
</script>
