<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>GigMate — Find Your Concert Buddy</title>

<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface-hover: #1a1a2e;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --text: #f1f1f3;
  --text-secondary: #71717a;
  --primary: #a855f7;
  --pink: #ec4899;
  --cyan: #06b6d4;
  --success: #22c55e;
  --danger: #ef4444;
  --gold: #f59e0b;
  --gradient: linear-gradient(135deg, #a855f7, #ec4899);
  --radius: 16px;
  --radius-sm: 8px;
  --radius-full: 9999px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --font: 'Inter', system-ui, -apple-system, sans-serif;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
::selection { background: rgba(168,85,247,0.3); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(168,85,247,0.5); }
a { color: inherit; text-decoration: none; }
img { display: block; }
button { font-family: var(--font); }
canvas#particles {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
#app { position: relative; z-index: 1; min-height: 100vh; }
#toast-container {
  position: fixed; top: 20px; right: 20px; z-index: 10000;
  display: flex; flex-direction: column; gap: 10px; pointer-events: none;
}
#modal-container {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 9000; display: none;
}
#confetti-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 9999;
}
.gradient-text {
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.glass {
  background: rgba(18,18,26,0.7);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
}
.glass-strong {
  background: rgba(18,18,26,0.9);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border: 1px solid var(--border);
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: var(--transition);
}
.card:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.btn-gradient {
  background: var(--gradient); color: #fff; border: none;
  padding: 14px 32px; border-radius: var(--radius-full);
  font-family: var(--font); font-weight: 600; font-size: 16px;
  cursor: pointer; transition: var(--transition);
  position: relative; overflow: hidden; display: inline-flex;
  align-items: center; justify-content: center; gap: 8px;
}
.btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(168,85,247,0.4); }
.btn-gradient:active { transform: translateY(0); }
.btn-gradient:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-outline {
  background: transparent; color: var(--text);
  border: 1px solid var(--border-hover);
  padding: 12px 28px; border-radius: var(--radius-full);
  font-family: var(--font); font-weight: 500; font-size: 14px;
  cursor: pointer; transition: var(--transition);
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-outline:hover { border-color: var(--primary); background: rgba(168,85,247,0.1); }
.btn-icon {
  width: 48px; height: 48px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: var(--transition); font-size: 20px; flex-shrink: 0;
}
.btn-icon:hover { border-color: var(--border-hover); transform: scale(1.1); }
.btn-icon.danger { border-color: rgba(239,68,68,0.3); color: var(--danger); }
.btn-icon.danger:hover { background: rgba(239,68,68,0.1); box-shadow: 0 0 20px rgba(239,68,68,0.2); }
.btn-icon.success { border-color: rgba(34,197,94,0.3); color: var(--success); }
.btn-icon.success:hover { background: rgba(34,197,94,0.1); box-shadow: 0 0 20px rgba(34,197,94,0.2); }
.btn-icon.gold { border-color: rgba(245,158,11,0.3); color: var(--gold); }
.btn-icon.gold:hover { background: rgba(245,158,11,0.1); box-shadow: 0 0 20px rgba(245,158,11,0.2); }
.btn-icon.large { width: 60px; height: 60px; font-size: 24px; }
.input {
  width: 100%; padding: 14px 18px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); font-family: var(--font); font-size: 16px;
  transition: var(--transition); outline: none;
}
.input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(168,85,247,0.15); }
.input::placeholder { color: var(--text-secondary); }
textarea.input { resize: vertical; min-height: 100px; }
select.input { appearance: auto; }
input[type="range"] {
  -webkit-appearance: none; width: 100%; height: 6px;
  background: var(--surface-hover); border-radius: 3px; outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 24px; height: 24px;
  border-radius: 50%; background: var(--gradient); cursor: pointer;
  border: 2px solid #fff; box-shadow: 0 2px 8px rgba(168,85,247,0.4);
}
input[type="range"]::-moz-range-thumb {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--primary); cursor: pointer; border: 2px solid #fff;
}
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 12px; border-radius: var(--radius-full);
  font-size: 12px; font-weight: 600; white-space: nowrap;
}
.badge-primary { background: rgba(168,85,247,0.15); color: var(--primary); }
.badge-pink { background: rgba(236,72,153,0.15); color: var(--pink); }
.badge-cyan { background: rgba(6,182,212,0.15); color: var(--cyan); }
.badge-success { background: rgba(34,197,94,0.15); color: var(--success); }
.badge-gold { background: rgba(245,158,11,0.15); color: var(--gold); }
.badge-danger { background: rgba(239,68,68,0.15); color: var(--danger); }
.avatar { border-radius: 50%; object-fit: cover; background: var(--surface-hover); display: block; }
.avatar-ring {
  position: relative; display: inline-flex; padding: 3px;
  border-radius: 50%; background: var(--gradient);
  background-size: 200% 200%; animation: gradientShift 3s ease infinite;
}
.avatar-ring .avatar { display: block; }
.toast {
  pointer-events: auto; padding: 14px 20px; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 500; display: flex; align-items: center;
  gap: 10px; min-width: 280px; max-width: 400px;
  animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.toast.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: var(--success); }
.toast.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: var(--danger); }
.toast.info { background: rgba(168,85,247,0.15); border: 1px solid rgba(168,85,247,0.3); color: var(--primary); }
.toast .toast-close { margin-left: auto; background: none; border: none; color: inherit; cursor: pointer; font-size: 18px; opacity: 0.7; }
.toast-exit { animation: slideOutRight 0.3s ease forwards; }
.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm);
}
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 72px;
  display: flex; align-items: center; justify-content: space-around;
  z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0);
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 8px 16px; font-size: 11px; color: var(--text-secondary);
  text-decoration: none; transition: var(--transition); position: relative;
  border-radius: var(--radius-sm); cursor: pointer; border: none; background: none;
  font-family: var(--font);
}
.nav-item .nav-icon { font-size: 22px; }
.nav-item.active { color: var(--primary); }
.nav-item.active::before {
  content: ''; position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%);
  width: 20px; height: 3px; border-radius: 2px; background: var(--gradient);
}
.side-nav {
  position: fixed; left: 0; top: 0; bottom: 0; width: 72px;
  display: none; flex-direction: column; align-items: center;
  padding: 20px 0; gap: 8px; z-index: 100;
  background: rgba(18,18,26,0.9); backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
}
.side-nav .nav-item {
  width: 52px; height: 52px; padding: 0; justify-content: center;
  border-radius: 12px; font-size: 0;
}
.side-nav .nav-item .nav-icon { font-size: 24px; }
.side-nav .nav-item.active::before {
  top: 50%; left: -2px; right: auto; bottom: auto;
  transform: translateY(-50%); width: 3px; height: 20px;
}
.side-nav .logo-small { font-size: 20px; font-weight: 800; margin-bottom: 20px; }
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px); display: flex; align-items: center;
  justify-content: center; z-index: 9001; animation: fadeIn 0.3s ease;
  padding: 20px;
}
.modal-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 32px; width: 100%;
  max-width: 420px; position: relative; animation: scaleIn 0.3s cubic-bezier(0.16,1,0.3,1);
}
.modal-close {
  position: absolute; top: 16px; right: 16px; background: none;
  border: none; color: var(--text-secondary); font-size: 24px;
  cursor: pointer; transition: var(--transition); width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center; border-radius: 50%;
}
.modal-close:hover { background: var(--surface-hover); color: var(--text); }
.progress-bar {
  width: 100%; height: 4px; background: var(--surface-hover);
  border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--gradient); border-radius: 2px;
  transition: width 0.4s ease;
}
.swipe-container {
  position: relative; height: 480px; width: 100%;
  display: flex; align-items: center; justify-content: center;
}
.swipe-card {
  position: absolute; inset: 0; border-radius: var(--radius);
  overflow: hidden; cursor: grab; user-select: none;
  touch-action: none; will-change: transform;
  border: 1px solid var(--border); background: var(--surface);
}
.swipe-card:active { cursor: grabbing; }
.swipe-stamp {
  position: absolute; top: 50%; transform: translateY(-50%) rotate(-15deg);
  font-size: 36px; font-weight: 800; padding: 12px 24px;
  border-radius: 12px; border: 4px solid; opacity: 0;
  z-index: 10; pointer-events: none; letter-spacing: 2px;
}
.stamp-right { right: 20px; color: var(--success); border-color: var(--success); background: rgba(34,197,94,0.1); transform: translateY(-50%) rotate(-15deg); }
.stamp-left { left: 20px; color: var(--danger); border-color: var(--danger); background: rgba(239,68,68,0.1); transform: translateY(-50%) rotate(15deg); }
.chat-header {
  position: sticky; top: 0; padding: 16px; z-index: 10;
  display: flex; align-items: center; gap: 12px;
}
.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.chat-input-bar {
  padding: 12px 16px; display: flex; gap: 12px;
  align-items: center; border-top: 1px solid var(--border);
}
.chat-input-bar input {
  flex: 1; padding: 12px 16px; border-radius: var(--radius-full);
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 14px; outline: none;
}
.chat-input-bar input:focus { border-color: var(--primary); }
.chat-input-bar button {
  width: 44px; height: 44px; border-radius: 50%; background: var(--gradient);
  border: none; color: #fff; font-size: 18px; cursor: pointer;
  transition: var(--transition); flex-shrink: 0;
}
.chat-input-bar button:hover { transform: scale(1.05); }
.chat-bubble {
  max-width: 80%; padding: 10px 16px; border-radius: 18px;
  font-size: 14px; line-height: 1.5; word-wrap: break-word;
}
.chat-bubble.sent {
  background: var(--gradient); color: #fff;
  border-bottom-right-radius: 4px;
}
.chat-bubble.received {
  background: var(--surface-hover); color: var(--text);
  border: 1px solid var(--border); border-bottom-left-radius: 4px;
}
.chat-time { font-size: 10px; color: var(--text-secondary); margin-top: 2px; padding: 0 4px; }
.match-item {
  display: flex; align-items: center; gap: 14px; padding: 16px;
  border-radius: var(--radius); cursor: pointer; transition: var(--transition);
  border: 1px solid transparent;
}
.match-item:hover { background: var(--surface-hover); border-color: var(--border); }
.event-card {
  border-radius: var(--radius); overflow: hidden; position: relative;
  cursor: pointer; transition: var(--transition); flex-shrink: 0;
}
.event-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.event-card img {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
}
.event-overlay {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  justify-content: flex-end; padding: 16px;
  background: linear-gradient(transparent 30%, rgba(0,0,0,0.85));
}
.event-interest-card {
  display: flex; gap: 14px; padding: 16px; border-radius: var(--radius);
  background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; transition: var(--transition); align-items: center;
}
.event-interest-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
.turf-card {
  padding: 20px; border-radius: var(--radius); background: var(--surface);
  border: 1px solid var(--border); transition: var(--transition);
}
.turf-card:hover { border-color: var(--border-hover); }
.genre-pill {
  display: inline-flex; align-items: center; padding: 8px 18px;
  border-radius: var(--radius-full); border: 1px solid var(--border);
  font-size: 13px; font-weight: 500; cursor: pointer; transition: var(--transition);
  color: var(--text-secondary); background: transparent; font-family: var(--font);
  user-select: none;
}
.genre-pill:hover { border-color: var(--border-hover); color: var(--text); }
.genre-pill.active {
  background: rgba(168,85,247,0.15); border-color: var(--primary);
  color: var(--primary); box-shadow: 0 0 12px rgba(168,85,247,0.2);
}
.persona-card {
  padding: 20px 12px; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--surface); text-align: center; cursor: pointer;
  transition: var(--transition); user-select: none;
}
.persona-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
.persona-card.active {
  border-color: var(--primary); background: rgba(168,85,247,0.08);
  box-shadow: 0 0 20px rgba(168,85,247,0.15);
}
.persona-emoji { font-size: 32px; display: block; margin-bottom: 8px; }
.persona-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.persona-desc { font-size: 11px; color: var(--text-secondary); }
.city-card {
  padding: 14px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--surface); text-align: center; cursor: pointer;
  font-size: 13px; font-weight: 500; transition: var(--transition); user-select: none;
}
.city-card:hover { border-color: var(--border-hover); }
.city-card.active {
  border-color: var(--primary); background: rgba(168,85,247,0.1);
  color: var(--primary);
}
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; text-align: center;
}
.stat-number { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
.stat-label { font-size: 12px; color: var(--text-secondary); }
.h-scroll {
  display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px;
  scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
}
.h-scroll::-webkit-scrollbar { display: none; }
.h-scroll > * { scroll-snap-align: start; }
.filter-pills {
  display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px;
  scrollbar-width: none;
}
.filter-pills::-webkit-scrollbar { display: none; }
.filter-pill {
  padding: 8px 18px; border-radius: var(--radius-full); border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary); font-size: 13px;
  font-weight: 500; cursor: pointer; transition: var(--transition);
  white-space: nowrap; font-family: var(--font);
}
.filter-pill:hover { border-color: var(--border-hover); color: var(--text); }
.filter-pill.active {
  background: rgba(168,85,247,0.15); border-color: var(--primary);
  color: var(--primary);
}
.upload-zone {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 40px 20px; text-align: center; cursor: pointer;
  transition: var(--transition); position: relative; overflow: hidden;
  min-height: 200px; display: flex; align-items: center; justify-content: center;
  flex-direction: column;
}
.upload-zone:hover { border-color: var(--primary); }
.upload-zone.dragover { border-color: var(--primary); background: rgba(168,85,247,0.05); }
.upload-preview {
  width: 150px; height: 150px; border-radius: 50%; object-fit: cover;
  display: none;
}
.upload-zone.has-preview .upload-preview { display: block; }
.upload-zone.has-preview .upload-text { display: none; }
.fab {
  position: fixed; bottom: 90px; right: 20px; width: 56px; height: 56px;
  border-radius: 50%; background: var(--gradient); color: #fff;
  font-size: 28px; border: none; cursor: pointer; z-index: 99;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(168,85,247,0.4); transition: var(--transition);
  font-weight: 300;
}
.fab:hover { transform: scale(1.1); box-shadow: 0 6px 30px rgba(168,85,247,0.5); }
.orb {
  position: absolute; border-radius: 50%; filter: blur(80px);
  animation: orb-float 20s infinite ease-in-out; pointer-events: none;
  opacity: 0.3;
}
.orb-1 { width: 400px; height: 400px; background: var(--primary); top: -100px; right: -100px; }
.orb-2 { width: 300px; height: 300px; background: var(--pink); bottom: 20%; left: -80px; animation-delay: -7s; }
.orb-3 { width: 250px; height: 250px; background: var(--cyan); top: 50%; right: 10%; animation-delay: -14s; }
.match-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.9);
  backdrop-filter: blur(20px); display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 8000;
  animation: fadeIn 0.5s ease;
}
.match-overlay .match-title {
  font-size: 48px; font-weight: 800;
  animation: matchPop 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.landing-nav {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 16px 24px; display: flex; align-items: center;
  justify-content: space-between; z-index: 200; transition: var(--transition);
}
.landing-nav.scrolled {
  background: rgba(10,10,15,0.8); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.landing-nav .logo { font-size: 22px; font-weight: 800; }
.landing-hero {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  padding: 20px; position: relative;
}
.landing-hero h1 {
  font-size: clamp(36px, 8vw, 64px); font-weight: 800;
  line-height: 1.1; margin-bottom: 20px;
}
.landing-hero .subtitle {
  font-size: clamp(16px, 3vw, 20px); color: var(--text-secondary);
  max-width: 500px; margin-bottom: 32px; min-height: 30px;
}
.typewriter-cursor {
  display: inline-block; width: 2px; height: 1em;
  background: var(--primary); margin-left: 2px;
  animation: pulse 1s infinite; vertical-align: text-bottom;
}
.scroll-arrow {
  position: absolute; bottom: 40px; animation: bounce 2s infinite;
  font-size: 28px; color: var(--text-secondary); cursor: pointer;
}
.landing-stats {
  display: flex; justify-content: center; gap: 48px;
  padding: 40px 20px; flex-wrap: wrap;
}
.landing-stat { text-align: center; }

// Particle system
function startParticles() {
  try {
    var canvas = document.getElementById('particles');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var particles = [];
    var mx = -1000, my = -1000;
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', function(e) { mx = e.clientX; my = e.clientY; });
    var count = Math.min(80, Math.floor(window.innerWidth * window.innerHeight / 20000));
    for (var i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
        size: Math.random() * 2 + 0.5, op: Math.random() * 0.4 + 0.1
      });
    }
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
        var dx = mx - p.x, dy = my - p.y, dist = Math.sqrt(dx*dx+dy*dy);
        if (dist < 120) { p.x -= dx * 0.008; p.y -= dy * 0.008; }
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(168,85,247,' + p.op + ')'; ctx.fill();
        for (var j = i + 1; j < particles.length; j++) {
          var p2 = particles[j];
          var d2 = Math.sqrt((p.x-p2.x)*(p.x-p2.x)+(p.y-p2.y)*(p.y-p2.y));
          if (d2 < 100) {
            ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = 'rgba(168,85,247,' + (0.06*(1-d2/100)) + ')';
            ctx.lineWidth = 0.5; ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }
    draw();
  } catch(e) {}
}

        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot*Math.PI/180);
        ctx.globalAlpha = p.op; ctx.fillStyle = p.color;
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
        ctx.restore();
      }
      if (alive) requestAnimationFrame(anim);
      else { active = false; ctx.clearRect(0, 0, canvas.width, canvas.height); }
    }
  } catch(e) {}
}

// Swipe card handler
function initSwipeCard(card, cbs) {
  var sx=0, sy=0, cx=0, cy=0, drag=false;
  var sr = card.querySelector('.stamp-right');
  var sl = card.querySelector('.stamp-left');
  function pos(e) { return e.touches ? {x:e.touches[0].clientX,y:e.touches[0].clientY} : {x:e.clientX,y:e.clientY}; }
  function onS(e) { drag=true; var p=pos(e); sx=p.x; sy=p.y; card.style.transition='none'; }
  function onM(e) {
    if (!drag) return; e.preventDefault();
    var p=pos(e); cx=p.x-sx; cy=p.y-sy;
    card.style.transform='translate('+cx+'px,'+cy+'px) rotate('+(cx*0.08)+'deg)';
    if (sr) sr.style.opacity=Math.max(0,Math.min(1,cx/100));
    if (sl) sl.style.opacity=Math.max(0,Math.min(1,-cx/100));
  }
  function onE() {
    if (!drag) return; drag=false;
    card.style.transition='transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s';
    if (cx>100) {
      card.style.transform='translate('+window.innerWidth+'px,'+cy+'px) rotate(30deg)'; card.style.opacity='0';
      setTimeout(function(){ if(cbs.onRight) cbs.onRight(); },300);
    } else if (cx<-100) {
      card.style.transform='translate('+(-window.innerWidth)+'px,'+cy+'px) rotate(-30deg)'; card.style.opacity='0';
      setTimeout(function(){ if(cbs.onLeft) cbs.onLeft(); },300);
    } else {
      card.style.transform='translate(0,0) rotate(0)';
      if (sr) sr.style.opacity='0'; if (sl) sl.style.opacity='0';
    }
    cx=0; cy=0;
  }
  card.addEventListener('mousedown', onS);
  card.addEventListener('touchstart', onS, {passive:true});
  window.addEventListener('mousemove', onM);
  window.addEventListener('touchmove', onM, {passive:false});
  window.addEventListener('mouseup', onE);
  window.addEventListener('touchend', onE);
}

// ========== API ==========
var API = {
  signInWithGoogle: function() {
    if (!sb) { showToast('Backend not available', 'info'); return Promise.resolve(); }
    return sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin}}).then(function(r){ if(r.error) throw r.error; }).catch(function(e){ showToast('Sign in failed: '+e.message,'error'); });
  },
  signInWithEmail: function(email) {
    if (!sb) { showToast('Backend not available', 'info'); return Promise.resolve(); }
    return sb.auth.signInWithOtp({email:email,options:{emailRedirectTo:window.location.origin}}).then(function(r){ if(r.error) throw r.error; showToast('Magic link sent! Check your email 📧','success'); }).catch(function(e){ showToast('Failed: '+e.message,'error'); });
  },
  signOut: function() {
    if (!sb) { state.user=null; state.profile=null; nav(''); return Promise.resolve(); }
    state.realtimeChannels.forEach(function(ch){ sb.removeChannel(ch); }); state.realtimeChannels=[];
    return sb.auth.signOut().then(function(){ state.user=null; state.profile=null; nav(''); }).catch(function(e){ showToast('Sign out failed','error'); });
  },
  getProfile: function(uid) {
    if (!sb) return Promise.resolve(null);
    return sb.from('profiles').select('*').eq('id',uid).single().then(function(r){ return r.data; }).catch(function(){ return null; });
  },
  updateProfile: function(uid, d) {
    if (!sb) return Promise.resolve(d);
    d.id = uid; d.updated_at = new Date().toISOString();
    return sb.from('profiles').upsert(d).select().single().then(function(r){ if(r.error) throw r.error; state.profile=r.data; return r.data; }).catch(function(e){ showToast('Failed to save: '+e.message,'error'); return null; });
  },
  uploadAvatar: function(uid, file) {
    if (!sb) return Promise.resolve(URL.createObjectURL(file));
    var ext = file.name.split('.').pop();
    var fn = uid + '/avatar.' + ext;
    return sb.storage.from('avatars').upload(fn, file, {upsert:true}).then(function(r){ if(r.error) throw r.error; return sb.storage.from('avatars').getPublicUrl(fn).data.publicUrl + '?t='+Date.now(); }).catch(function(e){ showToast('Upload failed','error'); return null; });
  },
  getEvents: function(city) {
    if (!sb) return Promise.resolve(DEMO_EVENTS);
    var q = sb.from('events').select('*').order('event_date',{ascending:true});
    if (city && city!=='All') q = q.eq('venue_city',city);
    return q.then(function(r){ return (r.data && r.data.length>0) ? r.data : DEMO_EVENTS; }).catch(function(){ return DEMO_EVENTS; });
  },
  getProfilesForEvent: function(eventId, uid) {
    if (!sb || (eventId && eventId.indexOf('de')===0)) return Promise.resolve([]);
    return sb.from('swipes').select('swiped_id').eq('swiper_id',uid).eq('event_id',eventId).then(function(r){
      var swiped = (r.data||[]).map(function(s){return s.swiped_id;}); swiped.push(uid);
      return sb.from('event_interests').select('user_id').eq('event_id',eventId).not('user_id','in','('+swiped.join(',')+')');
    }).then(function(r){
      if (!r.data || r.data.length===0) return [];
      var ids = r.data.map(function(u){return u.user_id;});
      return sb.from('profiles').select('*').in('id',ids).then(function(r2){return r2.data||[];});
    }).catch(function(){ return []; });
  },
  createSwipe: function(swiperId, swipedId, eventId, dir) {
    if (!sb) return Promise.resolve(null);
    return sb.from('swipes').insert({swiper_id:swiperId,swiped_id:swipedId,event_id:eventId,direction:dir}).then(function(r){
      if(r.error) throw r.error;
      if (dir==='right'||dir==='super') {
        return sb.from('matches').select('*').or('and(user1_id.eq.'+swiperId+',user2_id.eq.'+swipedId+'),and(user1_id.eq.'+swipedId+',user2_id.eq.'+swiperId+')').eq('event_id',eventId).maybeSingle().then(function(r2){return r2.data;});
      }
      return null;
    }).catch(function(){ return null; });
  },
  addEventInterest: function(uid, eid) {
    if (!sb) { showToast('Added! 🎉','success'); return Promise.resolve(); }
    return sb.from('event_interests').insert({user_id:uid,event_id:eid}).then(function(r){ if(r.error&&r.error.code==='23505'){showToast('Already added!','info');}else if(r.error){throw r.error;}else{showToast('Added! 🎉','success');} }).catch(function(e){showToast('Failed','error');});
  },
  getMatches: function(uid) {
    if (!sb) return Promise.resolve([]);
    return sb.from('matches').select('*, user1:profiles!matches_user1_id_fkey(*), user2:profiles!matches_user2_id_fkey(*), event:events(*)').or('user1_id.eq.'+uid+',user2_id.eq.'+uid).order('matched_at',{ascending:false}).then(function(r){return r.data||[];}).catch(function(){return [];});
  },
  getMessages: function(mid) {
    if (!sb) return Promise.resolve([]);
    return sb.from('messages').select('*').eq('match_id',mid).order('created_at',{ascending:true}).then(function(r){return r.data||[];}).catch(function(){return [];});
  },
  sendMessage: function(mid, sid, content) {
    if (!sb) return Promise.resolve(null);
    return sb.from('messages').insert({match_id:mid,sender_id:sid,content:content,read:false}).select().single().then(function(r){if(r.error)throw r.error;return r.data;}).catch(function(e){showToast('Send failed','error');return null;});
  },
  subMessages: function(mid, cb) {
    if (!sb) return null;
    var ch = sb.channel('msg:'+mid).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'match_id=eq.'+mid},function(p){cb(p.new);}).subscribe();
    state.realtimeChannels.push(ch); return ch;
  },
  subMatches: function(uid, cb) {
    if (!sb) return null;
    var ch = sb.channel('match:'+uid).on('postgres_changes',{event:'INSERT',schema:'public',table:'matches',filter:'user1_id=eq.'+uid},function(p){cb(p.new);}).on('postgres_changes',{event:'INSERT',schema:'public',table:'matches',filter:'user2_id=eq.'+uid},function(p){cb(p.new);}).subscribe();
    state.realtimeChannels.push(ch); return ch;
  },
  getTurfGames: function(sport, city) {
    if (!sb) { var g=[].concat(DEMO_TURF); if(sport&&sport!=='All') g=g.filter(function(x){return x.sport===sport;}); return Promise.resolve(g); }
    var q = sb.from('turf_games').select('*, creator:profiles!turf_games_creator_id_fkey(full_name,avatar_url)').order('game_date',{ascending:true});
    if (sport&&sport!=='All') q=q.eq('sport',sport);
    if (city) q=q.eq('location',city);
    return q.then(function(r){return (r.data&&r.data.length>0)?r.data:DEMO_TURF;}).catch(function(){return DEMO_TURF;});
  },
  createTurfGame: function(d) {
    if (!sb) { showToast('Game created! 🎉 (demo)','success'); return Promise.resolve(d); }
    return sb.from('turf_games').insert(d).select().single().then(function(r){if(r.error)throw r.error;showToast('Game created! 🎉','success');return r.data;}).catch(function(e){showToast('Failed: '+e.message,'error');return null;});
  },
  joinTurfGame: function(gid, uid) {
    if (!sb) { showToast('Joined! 🙌 (demo)','success'); return Promise.resolve(); }
    return sb.from('turf_game_players').insert({game_id:gid,user_id:uid}).then(function(r){if(r.error&&r.error.code==='23505'){showToast('Already joined!','info');}else if(r.error){throw r.error;}else{showToast('Joined! 🙌','success');}}).catch(function(e){showToast('Failed','error');});
  }
};

              else if(data.favorite_genres.length<5){data.favorite_genres.push(g);p.classList.add('active');}
              else{showToast('Max 5 genres!','info');return;}
              document.getElementById('gc').textContent=data.favorite_genres.length+'/5 selected';
              upd();
            };
          });
        } else if (step===4) {
          var vl = ['\u2601\uFE0F Super Chill','😌 Chill Macha','🙂 Easy Going','😊 Moderate','🤩 Getting There','🔥 Energetic','💃 Party Mode','🕺 Full Energy','⚡ Insane','🤯 Full Paagal'];
          c.innerHTML = '<div class="page-enter text-center"><div style="font-size:48px;margin-bottom:16px">⚡</div><h2 style="font-size:28px;font-weight:800;margin-bottom:8px">Your vibe level?</h2><p class="text-secondary mb-24">How crazy do you get at events?</p><div style="max-width:350px;margin:0 auto"><div id="vl" style="font-size:24px;font-weight:700;margin-bottom:20px;min-height:40px">'+vl[data.energy_level-1]+'</div><input type="range" min="1" max="10" value="'+data.energy_level+'" id="vs"><div style="display:flex;justify-content:space-between;margin-top:8px"><span class="text-secondary text-xs">Chill</span><span class="text-secondary text-xs">Paagal</span></div></div></div>';
          var sl = document.getElementById('vs');
          if(sl) sl.oninput=function(e){data.energy_level=parseInt(e.target.value);document.getElementById('vl').textContent=vl[data.energy_level-1];upd();};
        } else if (step===5) {
          c.innerHTML = '<div class="page-enter text-center"><div style="font-size:48px;margin-bottom:16px">🎭</div><h2 style="font-size:28px;font-weight:800;margin-bottom:8px">Your concert persona</h2><p class="text-secondary mb-24">Which one describes you best?</p><div class="grid-2" style="max-width:450px;margin:0 auto">'+PERSONAS.map(function(p){var v=p.emoji+' '+p.title;return '<div class="persona-card'+(data.concert_persona===v?' active':'')+'" data-p="'+v+'"><span class="persona-emoji">'+p.emoji+'</span><div class="persona-title">'+p.title+'</div><div class="persona-desc">'+p.desc+'</div></div>';}).join('')+'</div></div>';
          document.querySelectorAll('.persona-card').forEach(function(cd){
            cd.onclick=function(){document.querySelectorAll('.persona-card').forEach(function(x){x.classList.remove('active');});cd.classList.add('active');data.concert_persona=cd.dataset.p;upd();};
          });
        } else if (step===6) {
          c.innerHTML = '<div class="page-enter text-center"><div style="font-size:48px;margin-bottom:16px">📸</div><h2 style="font-size:28px;font-weight:800;margin-bottom:8px">Add a photo</h2><p class="text-secondary mb-24">Let people know who they\'re vibing with</p><div class="upload-zone'+(data.avatar_url?' has-preview':'')+'" id="uz" style="max-width:300px;margin:0 auto"><img class="upload-preview" id="ap" src="'+(data.avatar_url||'')+'" alt=""><div class="upload-text"><div style="font-size:40px;margin-bottom:8px">📁</div><p class="text-secondary">Drag & drop or click to upload</p></div><input type="file" accept="image/*" id="ai" style="display:none"></div><p class="text-secondary text-xs mt-8">Or skip for now</p></div>';
          var zone = document.getElementById('uz');
          var fi = document.getElementById('ai');
          zone.onclick=function(){fi.click();};
          zone.ondragover=function(e){e.preventDefault();zone.classList.add('dragover');};
          zone.ondragleave=function(){zone.classList.remove('dragover');};
          zone.ondrop=function(e){e.preventDefault();zone.classList.remove('dragover');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);};
          fi.onchange=function(e){if(e.target.files[0])handleFile(e.target.files[0]);};
          function handleFile(file){
            var pr = document.getElementById('ap');
            var reader = new FileReader();
            reader.onload=function(e){pr.src=e.target.result;zone.classList.add('has-preview');};
            reader.readAsDataURL(file);
            if(state.user){
              showToast('Uploading...','info');
              API.uploadAvatar(state.user.id,file).then(function(url){if(url){data.avatar_url=url;showToast('Photo uploaded!','success');}upd();});
            } else { data.avatar_url=URL.createObjectURL(file); upd(); }
          }
        } else if (step===7) {
          c.innerHTML = '<div class="page-enter text-center"><div style="font-size:48px;margin-bottom:16px">✍️</div><h2 style="font-size:28px;font-weight:800;margin-bottom:8px">Write a one-liner bio</h2><p class="text-secondary mb-24">Something fun that describes you</p><textarea class="input" id="onb-bio" placeholder="e.g., Looking for someone to headbang at the next Local Train gig 🤘" maxlength="150" style="max-width:400px;margin:0 auto;height:120px">'+esc(data.bio)+'</textarea><p class="text-secondary text-xs mt-8"><span id="bc">'+data.bio.length+'</span>/150</p></div>';
          var ta=document.getElementById('onb-bio');
          if(ta){ta.focus();ta.oninput=function(e){data.bio=e.target.value;document.getElementById('bc').textContent=data.bio.length;upd();};}
        }
        upd();
      }

      function upd(){
        var btn=document.getElementById('onb-next');if(!btn)return;
        var v=false;
        if(step===1) v=data.full_name.trim().length>=2;
        else if(step===2) v=data.city.length>0;
        else if(step===3) v=data.favorite_genres.length>=1;
        else if(step===4) v=true;
        else if(step===5) v=data.concert_persona.length>0;
        else if(step===6) v=true;
        else if(step===7) v=true;
        btn.disabled=!v;
      }

      document.getElementById('onb-next').onclick = function(){
        if(step<total){step++;render();}
        else {
          var btn=document.getElementById('onb-next');
          btn.textContent='Saving...';btn.disabled=true;
          var profileData = {
            full_name:data.full_name.trim(), city:data.city, favorite_genres:data.favorite_genres,
            energy_level:data.energy_level, concert_persona:data.concert_persona,
            avatar_url:data.avatar_url||defAvatar(data.full_name),
            bio:data.bio.trim()||'Music lover ✨'
          };
          if(state.user){
            API.updateProfile(state.user.id,profileData).then(function(){showToast('Welcome to GigMate! 🎉','success');nav('#home');});
          } else {
            state.profile=profileData;
            showToast('Welcome to GigMate! 🎉','success');nav('#home');
          }
        }
      };
      document.getElementById('onb-back').onclick=function(){if(step>1){step--;render();}};
      render();
    }
  };
}

function swipePage(eventId) {
  return {
    html:
      '<div class="main-content"><div class="page-container page-enter" style="max-width:420px">' +
        '<div class="flex items-center gap-12 mb-16" data-animate>' +
          '<button class="btn-icon" onclick="window.location.hash=\'#swipe\'" style="width:36px;height:36px;font-size:16px">←</button>' +
          '<div id="sw-evname" style="font-weight:600;font-size:15px">Loading...</div>' +
        '</div>' +
        '<div class="swipe-container" id="sw-container"></div>' +
        '<div class="flex justify-center items-center gap-20 mt-24" id="sw-actions">' +
          '<button class="btn-icon large danger" id="sw-pass">✕</button>' +
          '<button class="btn-icon large gold" id="sw-super">⭐</button>' +
          '<button class="btn-icon large success" id="sw-like">♥</button>' +
        '</div>' +
        '<div style="height:80px"></div>' +
      '</div>' + renderNav('swipe') + '</div>',
    init: function() {
      staggerIn(document.querySelector('.page-container'));
      var profiles = [];
      var idx = 0;
      var evName = document.getElementById('sw-evname');

      // Find event name
      var ev = DEMO_EVENTS.filter(function(e){return e.id===eventId;})[0];
      if (ev) { if(evName) evName.textContent = ev.title; }

      // Try to get real profiles, fall back to demo
      var getProfiles;
      if (state.user && eventId.indexOf('de') !== 0) {
        getProfiles = API.getProfilesForEvent(eventId, state.user.id);
      } else {
        getProfiles = Promise.resolve([]);
      }

      getProfiles.then(function(real) {
        profiles = real.length > 0 ? real : DEMO_PROFILES.slice();
        renderCards();
      });

      function renderCards() {
        var container = document.getElementById('sw-container');
        if (!container) return;
        if (idx >= profiles.length) {
          container.innerHTML = '<div class="empty-state"><span class="empty-emoji">🎉</span><h3>All caught up!</h3><p>Check back later for more people</p></div>';
          var acts = document.getElementById('sw-actions');
          if (acts) acts.style.display = 'none';
          return;
        }
        container.innerHTML = '';
        var showing = Math.min(3, profiles.length - idx);
        for (var i = showing - 1; i >= 0; i--) {
          var pi = idx + i;
          if (pi >= profiles.length) continue;
          var pr = profiles[pi];
          var myGenres = state.profile ? (state.profile.favorite_genres || []) : ['Indie','Rock'];
          var pct = matchPct(myGenres, pr.favorite_genres || []);
          var shared = (pr.favorite_genres||[]).filter(function(g){ return myGenres.indexOf(g)>=0; });
          var isTop = (i === 0);
          var scale = 1 - (i * 0.05);
          var yOff = i * 8;

          var card = document.createElement('div');
          card.className = 'swipe-card';
          card.style.zIndex = String(10 - i);
          if (!isTop) {
            card.style.transform = 'scale('+scale+') translateY('+yOff+'px)';
            card.style.pointerEvents = 'none';
          }
          card.innerHTML =
            '<img src="'+(pr.avatar_url||defAvatar(pr.full_name))+'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" onerror="this.src=\''+defAvatar(pr.full_name)+'\'">' +
            '<div class="swipe-card-inner">' +
              '<div class="swipe-stamp stamp-right">CHALEIN ✓</div>' +
              '<div class="swipe-stamp stamp-left">NAHI ✕</div>' +
              '<h3 style="font-size:24px;font-weight:800;margin-bottom:4px">'+esc(pr.full_name)+(pr.age?', '+pr.age:'')+'</h3>' +
              '<p style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">📍 '+(pr.city||'India')+'</p>' +
              (pr.concert_persona ? '<span class="badge badge-primary mb-8" style="display:inline-flex">'+pr.concert_persona.split('—')[0].trim()+'</span>' : '') +
              '<div style="margin:8px 0"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:12px;font-weight:600">Music Match</span><span style="font-size:12px;color:var(--primary);font-weight:700">'+pct+'%</span></div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div></div>' +
              (shared.length > 0 ? '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">'+shared.map(function(g){return '<span class="badge badge-pink" style="font-size:10px;padding:2px 8px">'+g+'</span>';}).join('')+'</div>' : '') +
              (pr.bio ? '<p style="font-size:13px;font-style:italic;color:var(--text-secondary);margin-top:4px">"'+esc(pr.bio)+'"</p>' : '') +
              '<div style="display:flex;gap:12px;margin-top:8px;font-size:11px;color:var(--text-secondary)"><span>🎵 '+(pr.total_events||0)+' events</span><span>⭐ '+(pr.rating_avg||'—')+'</span></div>' +
            '</div>';
          container.appendChild(card);

          if (isTop) {
            (function(topCard, profile) {
              initSwipeCard(topCard, {
                onRight: function() { handleSwipe(profile, 'right'); },
                onLeft: function() { handleSwipe(profile, 'left'); }
              });
            })(card, pr);
          }
        }
      }

      function handleSwipe(profile, dir) {
        idx++;
        if (state.user && profile.id && profile.id.indexOf('d') !== 0) {
          API.createSwipe(state.user.id, profile.id, eventId, dir).then(function(match) {
            if (match) { showMatchOverlay(profile); }
          });
        } else if (dir === 'right' || dir === 'super') {
          // Demo mode: random match
          if (Math.random() < 0.3) { showMatchOverlay(profile); }
        }
        setTimeout(renderCards, 100);
      }

      function showMatchOverlay(profile) {
        if (confetti) confetti.burst();
        var m = document.getElementById('modal-container');
        m.style.display = 'block';
        m.innerHTML =
          '<div class="match-overlay" id="match-ov">' +
            '<div class="match-title gradient-text" style="font-size:48px;font-weight:800;margin-bottom:16px">It\'s a Match! 🎉</div>' +
            '<div class="flex items-center gap-16 mb-24">' +
              '<div class="avatar-ring"><img class="avatar" width="80" height="80" src="'+(state.profile?state.profile.avatar_url:defAvatar('You'))+'" onerror="this.src=\''+defAvatar('You')+'\'"></div>' +
              '<div style="font-size:32px">💜</div>' +
              '<div class="avatar-ring"><img class="avatar" width="80" height="80" src="'+(profile.avatar_url||defAvatar(profile.full_name))+'" onerror="this.src=\''+defAvatar(profile.full_name)+'\'"></div>' +
            '</div>' +
            '<p class="text-secondary mb-24">You and '+esc(profile.full_name)+' are going together!</p>' +
            '<div class="flex gap-12"><button class="btn-gradient" onclick="document.getElementById(\'modal-container\').style.display=\'none\';document.getElementById(\'modal-container\').innerHTML=\'\';window.location.hash=\'#chat\'">Send a Message 💬</button><button class="btn-outline" onclick="document.getElementById(\'modal-container\').style.display=\'none\';document.getElementById(\'modal-container\').innerHTML=\'\'">Keep Swiping</button></div>' +
          '</div>';
      }

      // Button handlers
      var passBtn = document.getElementById('sw-pass');
      var superBtn = document.getElementById('sw-super');
      var likeBtn = document.getElementById('sw-like');
      if (passBtn) passBtn.onclick = function() {
        if (idx < profiles.length) {
          var topCard = document.querySelector('.swipe-card[style*="z-index: 10"], .swipe-card:last-child');
          if (topCard) {
            topCard.style.transition = 'transform 0.4s, opacity 0.4s';
            topCard.style.transform = 'translate(-'+window.innerWidth+'px,0) rotate(-30deg)';
            topCard.style.opacity = '0';
          }
          handleSwipe(profiles[idx], 'left');
        }
      };
      if (superBtn) superBtn.onclick = function() {
        if (idx < profiles.length) {
          var topCard = document.querySelector('.swipe-card[style*="z-index: 10"], .swipe-card:last-child');
          if (topCard) {
            topCard.style.transition = 'transform 0.4s, opacity 0.4s';
            topCard.style.transform = 'translateY(-'+window.innerHeight+'px) scale(0.5)';
            topCard.style.opacity = '0';
          }
          handleSwipe(profiles[idx], 'super');
        }
      };
      if (likeBtn) likeBtn.onclick = function() {
        if (idx < profiles.length) {
          var topCard = document.querySelector('.swipe-card[style*="z-index: 10"], .swipe-card:last-child');
          if (topCard) {
            topCard.style.transition = 'transform 0.4s, opacity 0.4s';
            topCard.style.transform = 'translate('+window.innerWidth+'px,0) rotate(30deg)';
            topCard.style.opacity = '0';
          }
          handleSwipe(profiles[idx], 'right');
        }
      };
    }
  };
}

function chatDetailPage(matchId) {
  return {
    html:
      '<div class="main-content" style="height:100vh;display:flex;flex-direction:column">' +
        '<div class="chat-header glass-strong" id="ch-header">' +
          '<button class="btn-icon" onclick="window.location.hash=\'#chat\'" style="width:36px;height:36px;font-size:16px">←</button>' +
          '<div id="ch-info">Loading...</div>' +
        '</div>' +
        '<div class="chat-messages" id="ch-msgs"></div>' +
        '<div class="chat-input-bar glass-strong">' +
          '<input type="text" id="ch-input" placeholder="Type a message...">' +
          '<button id="ch-send">→</button>' +
        '</div>' +
      '</div>',
    init: function() {
      var uid = state.user ? state.user.id : null;
      var messages = [];

      // Load match info
      API.getMatches(uid).then(function(matches) {
        var match = matches.filter(function(m){return m.id===matchId;})[0];
        var header = document.getElementById('ch-info');
        if (match && header) {
          var other = (match.user1 && match.user1.id === uid) ? match.user2 : match.user1;
          if (!other) other = {full_name:'Someone',avatar_url:''};
          header.innerHTML = '<div class="avatar-ring" style="padding:2px"><img class="avatar" width="36" height="36" src="'+(other.avatar_url||defAvatar(other.full_name))+'" onerror="this.src=\''+defAvatar(other.full_name)+'\'"></div><div><div style="font-weight:600;font-size:14px">'+esc(other.full_name)+'</div>'+(match.event?'<div class="text-secondary text-xs">'+match.event.title+'</div>':'')+'</div>';
        }
      });

      // Load messages
      API.getMessages(matchId).then(function(msgs) {
        messages = msgs;
        renderMsgs();
      });

      // Subscribe to realtime
      API.subMessages(matchId, function(msg) {
        if (msg.sender_id !== uid) {
          messages.push(msg);
          renderMsgs();
        }
      });

      function renderMsgs() {
        var c = document.getElementById('ch-msgs');
        if (!c) return;
        if (messages.length === 0) {
          c.innerHTML = '<div style="text-align:center;padding:40px 20px;margin:auto"><div style="font-size:48px;margin-bottom:12px">👋</div><p class="text-secondary">Say hi!</p></div>';
          return;
        }
        c.innerHTML = messages.map(function(msg) {
          var isMine = msg.sender_id === uid;
          return '<div style="display:flex;flex-direction:column;'+(isMine?'align-items:flex-end':'align-items:flex-start')+'"><div class="chat-bubble '+(isMine?'sent':'received')+'">'+esc(msg.content)+'</div><span class="chat-time">'+timeAgo(msg.created_at)+'</span></div>';
        }).join('');
        c.scrollTop = c.scrollHeight;
      }

      function sendMsg() {
        var inp = document.getElementById('ch-input');
        var content = inp.value.trim();
        if (!content || !uid) return;
        inp.value = '';
        API.sendMessage(matchId, uid, content).then(function(msg) {
          if (msg) { messages.push(msg); renderMsgs(); }
        });
      }

      var sb2 = document.getElementById('ch-send');
      var inp2 = document.getElementById('ch-input');
      if (sb2) sb2.onclick = sendMsg;
      if (inp2) { inp2.onkeydown = function(e){ if(e.key==='Enter') sendMsg(); }; inp2.focus(); }
    }
  };
}

// ========== ROUTER ==========
function getRoute() {
  var hash = window.location.hash.slice(1) || '';
  var slash = hash.indexOf('/');
  if (slash >= 0) return { page: hash.substring(0, slash), param: hash.substring(slash + 1) };
  return { page: hash, param: '' };
}

function router() {
  var route = getRoute();
  var page = route.page;
  var param = route.param;
  var app = document.getElementById('app');
  if (!app) return;

  var key = page + '/' + param;
  if (state.currentPage === key && page !== '') return;
  state.currentPage = key;

  var pageObj = null;

  switch (page) {
    case '':
      if (state.user && state.profile && state.profile.full_name) { nav('#home'); return; }
      pageObj = landingPage();
      break;
    case 'onboarding':
      pageObj = onboardingPage();
      break;
    case 'home':
      if (!state.user && !state.profile) { nav(''); return; }
      pageObj = homePage();
      break;
    case 'swipe':
      if (!state.user && !state.profile) { nav(''); return; }
      pageObj = param ? swipePage(param) : swipeSelectPage();
      break;
    case 'chat':
      if (!state.user) { nav(''); return; }
      pageObj = param ? chatDetailPage(param) : chatListPage();
      break;
    case 'turf':
      if (!state.user && !state.profile) { nav(''); return; }
      pageObj = turfPage();
      break;
    case 'profile':
      if (!state.user && !state.profile) { nav(''); return; }
      pageObj = profilePage();
      break;
    default:
      nav(state.user ? '#home' : '');
      return;
  }

  if (pageObj) {
    app.innerHTML = pageObj.html;
    try { if (pageObj.init) pageObj.init(); } catch(e) { console.error('Page init error:', e); }
  }
}

window.addEventListener('hashchange', router);

// ========== APP INIT ==========
function initApp() {
  // Start visual systems
  startParticles();
  initConfetti();

  // Try loading Supabase SDK dynamically if not already loaded
  initSupabase();

  if (sb) {
    sb.auth.getSession().then(function(res) {
      var session = res.data ? res.data.session : null;
      if (session && session.user) {
        state.user = session.user;
        return API.getProfile(session.user.id).then(function(profile) {
          state.profile = profile;
          if (!profile || !profile.full_name || !profile.city) {
            nav('#onboarding');
          } else if (!window.location.hash || window.location.hash === '#' || window.location.hash === '') {
            nav('#home');
          } else {
            router();
          }
          API.subMatches(session.user.id, function() {
            showToast("It's a match! 🎉", 'success');
            if (confetti) confetti.burst();
          });
        });
      } else {
        router();
      }
    }).catch(function(e) {
      console.warn('Session check failed:', e);
      router();
    });

    sb.auth.onAuthStateChange(function(event, session) {
      if (event === 'SIGNED_IN' && session && session.user) {
        state.user = session.user;
        var m = document.getElementById('modal-container');
        if (m) { m.style.display = 'none'; m.innerHTML = ''; }
        API.getProfile(session.user.id).then(function(profile) {
          state.profile = profile;
          if (!profile || !profile.full_name || !profile.city) nav('#onboarding');
          else nav('#home');
          API.subMatches(session.user.id, function() {
            showToast("It's a match! 🎉", 'success');
            if (confetti) confetti.burst();
          });
        });
      } else if (event === 'SIGNED_OUT') {
        state.user = null; state.profile = null; state.currentPage = '';
        nav('');
      }
    });
  } else {
    // No Supabase - just render the page
    router();
  }
}

// Load Supabase SDK then init
function loadSupabaseSDK() {
  var script = document.createElement('script');
  script.src = 'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase-js.min.js';
  script.onload = function() {
    initSupabase();
    initApp();
  };
  script.onerror = function() {
    console.warn('Supabase SDK failed to load, running in demo mode');
    initApp();
  };
  document.head.appendChild(script);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', loadSupabaseSDK);
} else {
  loadSupabaseSDK();
}

})();
