<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCQ Solver</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff3366;
    --text: #e8e8f0;
    --muted: #555570;
    --card: #13131f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,136,0.015) 2px,
      rgba(0,255,136,0.015) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,255,136,0.4);
  }

  .logo span { color: var(--accent2); }

  .status-pill {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .status-pill.ready { border-color: var(--accent); color: var(--accent); }
  .status-pill.thinking { border-color: #ffaa00; color: #ffaa00; animation: pulse 1s infinite; }
  .status-pill.error { border-color: var(--accent2); color: var(--accent2); }

  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }

  .main {
    width: 100%;
    max-width: 900px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .panel-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.3);
  }

  /* Camera */
  .camera-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    overflow: hidden;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #canvas { display: none; }

  .camera-overlay {
    position: absolute;
    inset: 0;
    border: 2px solid transparent;
    pointer-events: none;
    transition: border-color 0.3s;
  }

  .camera-overlay.scanning {
    border-color: var(--accent);
    box-shadow: inset 0 0 30px rgba(0,255,136,0.15);
    animation: scan 2s infinite;
  }

  @keyframes scan {
    0% { box-shadow: inset 0 0 30px rgba(0,255,136,0.1); }
    50% { box-shadow: inset 0 0 60px rgba(0,255,136,0.25); }
    100% { box-shadow: inset 0 0 30px rgba(0,255,136,0.1); }
  }

  /* Corner markers */
  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.7;
  }
  .corner.tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

  /* No camera state */
  .no-camera {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    font-size: 0.85rem;
  }

  .no-camera .icon { font-size: 2.5rem; }

  /* Answer panel */
  .answer-panel {
    display: flex;
    flex-direction: column;
  }

  .answer-display {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    min-height: 200px;
    position: relative;
    overflow: hidden;
  }

  .answer-letter {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 8rem;
    line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 60px rgba(0,255,136,0.5);
    transition: all 0.3s;
    letter-spacing: 4px;
  }

  .answer-letter.wrong { color: var(--accent2); text-shadow: 0 0 60px rgba(255,51,102,0.5); }

  .answer-sub {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .waiting-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 1px;
    line-height: 1.8;
  }

  .thinking-anim {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }

  .dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.4s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Controls */
  .controls {
    width: 100%;
    max-width: 900px;
    margin-top: 20px;
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .btn-capture {
    flex: 1;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-capture:hover { background: #00ffaa; transform: translateY(-1px); }
  .btn-capture:active { transform: translateY(1px); }
  .btn-capture:disabled {
    background: var(--muted);
    cursor: not-allowed;
    transform: none;
  }

  .btn-cam {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    padding: 18px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-cam:hover { border-color: var(--accent); color: var(--accent); }

  /* API Key section */
  .api-section {
    width: 100%;
    max-width: 900px;
    margin-top: 20px;
  }

  .api-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .api-input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 1px;
  }

  .api-input:focus { border-color: var(--accent); }
  .api-input::placeholder { color: var(--muted); }

  .api-link {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    text-decoration: none;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    white-space: nowrap;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .api-link:hover { border-color: var(--accent); background: rgba(0,255,136,0.05); }

  /* Stats row */
  .stats {
    width: 100%;
    max-width: 900px;
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }

  .stat {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }

  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* History */
  .history-section {
    width: 100%;
    max-width: 900px;
    margin-top: 20px;
  }

  .history-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .history-track {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .history-pill {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 1px;
  }

  .history-pill.answered {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,255,136,0.05);
  }

  /* Rate limit warning */
  .rate-warn {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: #ffaa00;
    letter-spacing: 1px;
    text-align: center;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .rate-warn.show { opacity: 1; }

  /* Cooldown bar */
  .cooldown-bar {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }

  .cooldown-fill {
    height: 100%;
    background: var(--accent);
    width: 100%;
    transition: width linear;
  }

  footer {
    width: 100%;
    max-width: 900px;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .model-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    padding: 4px 10px;
    border: 1px solid #333;
    border-radius: 4px;
    color: var(--muted);
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">MCQ<span>.</span>AI</div>
  <div class="status-pill" id="statusPill">NO CAMERA</div>
</header>

<div class="main">

  <!-- Camera Panel -->
  <div class="panel">
    <div class="panel-label">📷 Camera Feed — Point at TV</div>
    <div class="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="camera-overlay" id="cameraOverlay">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>
      <div class="no-camera" id="noCameraMsg">
        <div class="icon">📷</div>
        <div>Click START CAMERA below</div>
      </div>
    </div>
  </div>

  <!-- Answer Panel -->
  <div class="panel answer-panel">
    <div class="panel-label">🎯 Answer</div>
    <div class="answer-display" id="answerDisplay">
      <div class="waiting-text" id="waitingText">
        Start camera<br>then hit CAPTURE
      </div>
    </div>
  </div>

</div>

<!-- API Key -->
<div class="api-section">
  <div class="api-row">
    <input
      type="password"
      class="api-input"
      id="apiKey"
      placeholder="Paste your Gemini API key here..."
    />
    <a href="https://aistudio.google.com/apikey" target="_blank" class="api-link">GET KEY →</a>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="btn-cam" id="camBtn" onclick="startCamera()">START CAMERA</button>
  <button class="btn-capture" id="captureBtn" onclick="captureAndSolve()" disabled>
    ⚡ CAPTURE &amp; SOLVE
  </button>
</div>

<div class="rate-warn" id="rateWarn">⏱ FREE TIER: 6 SEC COOLDOWN BETWEEN QUESTIONS</div>
<div class="cooldown-bar" id="cooldownBar" style="display:none">
  <div class="cooldown-fill" id="cooldownFill"></div>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat">
    <div class="stat-val" id="statAnswered">0</div>
    <div class="stat-label">Answered</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="statTime">—</div>
    <div class="stat-label">Last Speed</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="statCost">₹0</div>
    <div class="stat-label">Est. Cost</div>
  </div>
</div>

<!-- History -->
<div class="history-section">
  <div class="history-label">Answer History</div>
  <div class="history-track" id="historyTrack">
    <div style="font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted)">
      No answers yet
    </div>
  </div>
</div>

<footer>
  <div class="footer-text">GEMINI 2.5 FLASH · FREE TIER · SRMJEEE READY</div>
  <div class="model-badge">gemini-2.5-flash</div>
</footer>

<script>
  let stream = null;
  let answered = 0;
  let lastCapture = 0;
  const COOLDOWN = 6000; // 6 seconds for free tier (10 req/min)
  const history = [];

  async function startCamera() {
    const btn = document.getElementById('camBtn');
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: 'environment' },
        audio: false
      });
      const video = document.getElementById('video');
      video.srcObject = stream;
      document.getElementById('noCameraMsg').style.display = 'none';
      document.getElementById('cameraOverlay').classList.add('scanning');
      document.getElementById('captureBtn').disabled = false;
      document.getElementById('rateWarn').classList.add('show');
      setStatus('READY', 'ready');
      btn.textContent = 'SWITCH CAM';
      btn.onclick = switchCamera;
    } catch(e) {
      setStatus('CAM ERROR', 'error');
      alert('Camera access denied. Please allow camera permission.');
    }
  }

  async function switchCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    const current = stream?.getVideoTracks()[0]?.getSettings()?.facingMode;
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: current === 'environment' ? 'user' : 'environment' }
    });
    document.getElementById('video').srcObject = stream;
  }

  async function captureAndSolve() {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) {
      alert('Please paste your Gemini API key first.\nGet it free at aistudio.google.com/apikey');
      return;
    }

    if (!stream) {
      alert('Start camera first!');
      return;
    }

    // Cooldown check
    const now = Date.now();
    if (now - lastCapture < COOLDOWN) {
      const wait = Math.ceil((COOLDOWN - (now - lastCapture)) / 1000);
      alert(`Wait ${wait} more seconds (free tier limit)`);
      return;
    }
    lastCapture = now;

    // Start cooldown bar
    showCooldown();

    // Capture frame
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    const base64 = canvas.toDataURL('image/jpeg', 0.92).split(',')[1];

    // UI: thinking state
    setStatus('THINKING', 'thinking');
    showThinking();
    document.getElementById('captureBtn').disabled = true;

    const startTime = Date.now();

    try {
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [
                {
                  inline_data: {
                    mime_type: 'image/jpeg',
                    data: base64
                  }
                },
                {
                  text: `You are looking at a photo of a TV screen showing a multiple choice question (MCQ) from an Indian engineering entrance exam (Class 12 Physics, Chemistry, or Mathematics level).

Your job:
1. Read the full question text carefully
2. Read all 4 options (A, B, C, D) carefully  
3. Solve the question
4. Respond in EXACTLY this format:

ANSWER: [letter]
OPTION: [full text of the correct option]

Example response:
ANSWER: B
OPTION: Laminar

Nothing else. No explanation. No preamble. Just those two lines.`
                }
              ]
            }],
            generationConfig: {
              maxOutputTokens: 50,
              temperature: 0
            }
          })
        }
      );

      const data = await response.json();
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

      if (data.error) {
        throw new Error(data.error.message);
      }

      const raw = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';

      // Parse ANSWER: X and OPTION: text
      const letterMatch = raw.match(/ANSWER:\s*([ABCD])/i);
      const optionMatch = raw.match(/OPTION:\s*(.+)/i);

      const letter = letterMatch?.[1]?.toUpperCase() || '?';
      const optionText = optionMatch?.[1]?.trim() || raw;

      // Show answer
      showAnswer(letter, optionText, elapsed);
      updateStats(elapsed);
      addHistory(letter);

    } catch(err) {
      setStatus('API ERROR', 'error');
      showError(err.message);
      console.error(err);
    } finally {
      // Re-enable after cooldown
      setTimeout(() => {
        document.getElementById('captureBtn').disabled = false;
        setStatus('READY', 'ready');
      }, COOLDOWN);
    }
  }

  function showAnswer(letter, optionText, time) {
    const display = document.getElementById('answerDisplay');
    const isValid = ['A','B','C','D'].includes(letter);
    display.innerHTML = `
      <div class="answer-letter ${!isValid ? 'wrong' : ''}">${isValid ? letter : '?'}</div>
      <div style="
        font-family:'DM Sans',sans-serif;
        font-size:1rem;
        color:${isValid ? 'var(--accent)' : 'var(--accent2)'};
        text-align:center;
        max-width:220px;
        margin-top:10px;
        line-height:1.4;
        font-weight:500;
      ">${isValid ? optionText : 'Could not read — try again'}</div>
      <div class="answer-sub" style="margin-top:10px">${isValid ? `ANSWERED IN ${time}s` : 'RETAKE CLEARER PHOTO'}</div>
    `;
    setStatus(isValid ? 'ANSWERED' : 'RETRY', isValid ? 'ready' : 'error');
  }

  function showThinking() {
    document.getElementById('answerDisplay').innerHTML = `
      <div class="waiting-text">Reading question...</div>
      <div class="thinking-anim">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    `;
  }

  function showError(msg) {
    document.getElementById('answerDisplay').innerHTML = `
      <div class="answer-letter wrong" style="font-size:3rem">ERR</div>
      <div class="answer-sub" style="color:#ff3366;font-size:0.55rem;max-width:200px;text-align:center;margin-top:8px">
        ${msg.substring(0, 80)}
      </div>
    `;
  }

  function setStatus(text, type) {
    const pill = document.getElementById('statusPill');
    pill.textContent = text;
    pill.className = `status-pill ${type}`;
  }

  function updateStats(time) {
    answered++;
    document.getElementById('statAnswered').textContent = answered;
    document.getElementById('statTime').textContent = time + 's';
    // Gemini 2.5 Flash cost estimate: ~$0.0002 per question (free tier = ₹0)
    const cost = answered <= 250 ? '₹0' : `₹${(answered * 0.015).toFixed(2)}`;
    document.getElementById('statCost').textContent = cost;
  }

  function addHistory(letter) {
    history.push(letter);
    const track = document.getElementById('historyTrack');

    if (history.length === 1) track.innerHTML = '';

    const pill = document.createElement('div');
    pill.className = 'history-pill answered';
    pill.textContent = `Q${history.length}:${letter}`;
    track.appendChild(pill);
  }

  function showCooldown() {
    const bar = document.getElementById('cooldownBar');
    const fill = document.getElementById('cooldownFill');
    bar.style.display = 'block';
    fill.style.transition = 'none';
    fill.style.width = '100%';

    requestAnimationFrame(() => {
      fill.style.transition = `width ${COOLDOWN}ms linear`;
      fill.style.width = '0%';
    });

    setTimeout(() => { bar.style.display = 'none'; }, COOLDOWN + 100);
  }

  // Keyboard shortcut: Space to capture
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && !document.getElementById('captureBtn').disabled) {
      e.preventDefault();
      captureAndSolve();
    }
  });
</script>

</body>
</html>
